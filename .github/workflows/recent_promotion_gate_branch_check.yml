name: Recent Promotion Gate PR Check

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: recent-promotion-gate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile gate modules
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/promote_nested_candidate.py \
            scripts/promote_nested_candidate_strict.py \
            tests/test_nested_promotion_gates.py \
            tests/test_strict_adoption_gates.py
      - name: Run gate regression tests
        run: |
          set -euo pipefail
          python -m unittest \
            tests.test_nested_promotion_gates \
            tests.test_strict_adoption_gates -v
      - name: Validate workflow thresholds
        run: |
          set -euo pipefail
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/loto7_nested_walk_forward.yml"); puts "workflow YAML valid"'
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/loto7_nested_walk_forward.yml').read_text(encoding='utf-8')
          required = {
              '--min-nested-total-roi-delta-percent 0.5': 2,
              '--min-fold-roi-improvement-percent 0.5': 2,
              '--min-median-roi-delta-percent 0.5': 2,
              '--min-median-top1-removed-delta-percent 0.5': 2,
              '--min-focus-roi-delta-percent 0.5': 2,
              '--min-top1-removed-delta-percent 0.5': 2,
              '--max-top1-payout-share 0.50': 2,
          }
          for marker, minimum_count in required.items():
              actual = text.count(marker)
              assert actual >= minimum_count, f'{marker}: {actual} < {minimum_count}'
          print('Recent and Super Recent promotion thresholds are explicit and fail-closed')
          PY
