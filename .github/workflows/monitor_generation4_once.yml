name: Monitor Generation 4 Full Run Once

# monitor-request: 2026-07-16T11:38:00Z
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/monitor_generation4_once.yml"
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: monitor-generation4-once
  cancel-in-progress: true

jobs:
  monitor-generation4:
    runs-on: ubuntu-latest
    timeout-minutes: 125
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Find and monitor latest Generation 4 dispatch
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p outputs/generation4
          RUN_ID="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow loto7_dual_prediction.yml \
            --event workflow_dispatch \
            --branch main \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"
          if [ -z "$RUN_ID" ] || [ "$RUN_ID" = "null" ]; then
            echo "No Generation 4 workflow_dispatch run found" >&2
            exit 1
          fi
          echo "run_id=${RUN_ID}" >> "$GITHUB_OUTPUT"
          set +e
          gh run watch "$RUN_ID" --repo "${GITHUB_REPOSITORY}" --exit-status
          WATCH_EXIT=$?
          set -e
          gh run view "$RUN_ID" \
            --repo "${GITHUB_REPOSITORY}" \
            --json databaseId,workflowName,status,conclusion,createdAt,updatedAt,headSha,url,jobs \
            > outputs/generation4/full_run_status.json
          printf 'run_id=%s\nwatch_exit=%s\nmonitored_at=%s\n' \
            "$RUN_ID" "$WATCH_EXIT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > outputs/generation4/full_run_status.txt
          echo "watch_exit=${WATCH_EXIT}" >> "$GITHUB_OUTPUT"

      - name: Commit full-run status
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main
          git add -f outputs/generation4/full_run_status.json outputs/generation4/full_run_status.txt
          if git diff --cached --quiet; then
            echo "No monitor status changes"
            exit 0
          fi
          git commit -m "Record Generation 4 full-run status [skip ci]"
          git push origin HEAD:main

      - name: Require successful Generation 4 conclusion
        env:
          WATCH_EXIT: ${{ steps.monitor.outputs.watch_exit }}
        run: |
          test "${WATCH_EXIT}" = "0"
