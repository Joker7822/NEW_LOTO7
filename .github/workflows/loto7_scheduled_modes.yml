name: LOTO7 Scheduled Modes

on:
  workflow_dispatch:
  schedule:
    # Weekly full_power: Sunday 00:05 JST = Saturday 15:05 UTC
    - cron: "5 15 * * 6"
    # Monthly reset full_power: runs at 00:00 JST around month boundary.
    # UTC dates 28-31 are checked; job proceeds only when Asia/Tokyo day is 01.
    - cron: "0 15 28-31 * *"

permissions:
  actions: write
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-scheduled-modes-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve schedule mode
        id: mode
        run: |
          set -euo pipefail

          EVENT_SCHEDULE="${{ github.event.schedule || '' }}"
          JST_DAY="$(TZ=Asia/Tokyo date +%d)"

          MODE="full_power"
          RESET_STATE="false"
          SHOULD_RUN="true"

          if [ "$EVENT_SCHEDULE" = "0 15 28-31 * *" ]; then
            if [ "$JST_DAY" = "01" ]; then
              MODE="full_power"
              RESET_STATE="true"
              SHOULD_RUN="true"
            else
              SHOULD_RUN="false"
            fi
          fi

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "reset_state=${RESET_STATE}" >> "$GITHUB_OUTPUT"
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"

          echo "[SCHEDULED_MODE] schedule=${EVENT_SCHEDULE} jst_day=${JST_DAY} mode=${MODE} reset_state=${RESET_STATE} should_run=${SHOULD_RUN}"

      - name: Dispatch LOTO7 Evolution Trainer
        if: ${{ steps.mode.outputs.should_run == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run "loto7_evolution.yml" \
            --ref "${{ github.ref_name }}" \
            -f evolution_mode="${{ steps.mode.outputs.mode }}" \
            -f generations="100" \
            -f population="200" \
            -f max_targets="240" \
            -f target_stride="2" \
            -f workers="4" \
            -f reset_state="${{ steps.mode.outputs.reset_state }}" \
            -f run_ml_stack="true" \
            -f run_complete_ai="true"
