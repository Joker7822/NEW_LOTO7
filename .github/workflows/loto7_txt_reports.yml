name: LOTO7 TXT Reports

on:
  workflow_dispatch:
  schedule:
    # JST 01:30 / 07:30 / 13:30 / 19:30
    - cron: "30 4,10,16,22 * * *"
  push:
    paths:
      - "outputs/**/*.txt"
      - "outputs/**/*.md"
      - "outputs/**/*.json"
      - "scripts/collect_txt_reports.py"
      - ".github/workflows/loto7_txt_reports.yml"

permissions:
  contents: write

concurrency:
  group: loto7-txt-reports-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  collect-txt-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Pull latest outputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
      - name: Rebuild outputs/txt_reports
        run: |
          set -euo pipefail
          python scripts/collect_txt_reports.py --output-dir outputs/txt_reports --clean
      - name: Commit txt reports
        run: |
          set -euo pipefail
          git add -f outputs/txt_reports/*.txt outputs/txt_reports/*.md outputs/txt_reports/*.json || true
          if git diff --cached --quiet; then
            echo "No txt report changes"
            exit 0
          fi
          git commit -m "Rebuild LOTO7 TXT reports [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Upload txt reports artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-txt-reports
          path: |
            outputs/txt_reports/*.txt
            outputs/txt_reports/*.md
            outputs/txt_reports/*.json
          if-no-files-found: warn
