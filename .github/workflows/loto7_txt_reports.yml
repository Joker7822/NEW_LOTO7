name: LOTO7 TXT Reports

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'outputs/**/*.txt'
      - 'outputs/**/*.md'
      - 'outputs/self_evolution/*.json'
      - 'loto7_self_evolution_config.json'
      - 'scripts/collect_txt_reports.sh'
      - '.github/workflows/loto7_txt_reports.yml'

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  collect-txt-reports:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Collect TXT reports
        run: |
          set -euo pipefail
          bash scripts/collect_txt_reports.sh outputs/txt_reports

      - name: Show index
        run: |
          set -euo pipefail
          if [ -f outputs/txt_reports/00_index.txt ]; then
            cat outputs/txt_reports/00_index.txt
          fi

      - name: Upload TXT reports
        uses: actions/upload-artifact@v4
        with:
          name: loto7-txt-reports
          path: outputs/txt_reports/*.txt
          if-no-files-found: ignore
