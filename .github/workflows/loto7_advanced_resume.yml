name: NEW_LOTO7 Advanced Resume

on:
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run resumable backtest'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      chunk_size:
        description: 'Max backtest draws in this workflow run'
        required: true
        default: '100'
      commit_every:
        description: 'Commit/push every N processed draws inside Python'
        required: true
        default: '10'
  schedule:
    - cron: '0 12 * * 2,5'

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: '1'
  LOTO7_MONTE_CARLO: '30000'
  LOTO7_BACKTEST_MONTE_CARLO: '800'
  LOTO7_OPTUNA_TRIALS: '20'
  LOTO7_MCTS_ITERATIONS: '2500'
  LOTO7_DISABLE_OPTIMIZE: '0'

concurrency:
  group: loto7-advanced-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict-and-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git pull --rebase origin "${GITHUB_REF_NAME}" || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install optuna scikit-learn catboost || true

      - name: Ensure scripts directory
        run: |
          mkdir -p scripts
          if [ -f resumable_loto7_backtest.py ] && [ ! -f scripts/resumable_loto7_backtest.py ]; then
            cp resumable_loto7_backtest.py scripts/resumable_loto7_backtest.py
          fi

      - name: Run latest prediction
        run: |
          python loto7_logic_predictor.py \
            --tickets 10 \
            --pool-size 24 \
            --save-count 10

      - name: Commit prediction files
        run: |
          git add \
            loto7_predictions.csv \
            latest_loto7_prediction.txt \
            loto7_memorybank.csv \
            loto7_memorybank_5plus.csv \
            loto7_advanced_weights.json \
            loto7_meta_classifier.json \
            loto7_hit_structure_clusters.csv \
            || true
          git diff --cached --quiet || git commit -m "auto update loto7 prediction"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push || true

      - name: Run resumable backtest with in-loop commits
        if: ${{ github.event_name == 'schedule' || github.event.inputs.run_backtest == 'true' }}
        run: |
          CHUNK_SIZE="${{ github.event.inputs.chunk_size || '100' }}"
          COMMIT_EVERY="${{ github.event.inputs.commit_every || '10' }}"
          echo "CHUNK_SIZE=${CHUNK_SIZE} COMMIT_EVERY=${COMMIT_EVERY}"

          python scripts/resumable_loto7_backtest.py \
            --csv loto7.csv \
            --min-train 1 \
            --tickets 10 \
            --pool-size 16 \
            --chunk-size "${CHUNK_SIZE}" \
            --save-every 2 \
            --commit-every "${COMMIT_EVERY}" \
            --commit-inside-loop \
            --detail-csv loto7_backtest_detail.csv \
            --summary-csv loto7_backtest_summary.csv \
            --report-txt loto7_backtest_report.txt \
            --resume-json loto7_backtest_resume.json

      - name: Final commit safety net
        if: always()
        run: |
          git add \
            loto7_predictions.csv \
            latest_loto7_prediction.txt \
            loto7_backtest_detail.csv \
            loto7_backtest_summary.csv \
            loto7_backtest_report.txt \
            loto7_backtest_resume.json \
            loto7_memorybank.csv \
            loto7_memorybank_5plus.csv \
            loto7_advanced_weights.json \
            loto7_meta_classifier.json \
            loto7_hit_structure_clusters.csv \
            || true
          git diff --cached --quiet || git commit -m "final save loto7 advanced results"
          git pull --rebase origin "${GITHUB_REF_NAME}" || true
          git push || true

      - name: Upload result artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto7-advanced-results
          if-no-files-found: ignore
          retention-days: 30
          path: |
            loto7_predictions.csv
            latest_loto7_prediction.txt
            loto7_backtest_detail.csv
            loto7_backtest_summary.csv
            loto7_backtest_report.txt
            loto7_backtest_resume.json
            loto7_memorybank.csv
            loto7_memorybank_5plus.csv
            loto7_advanced_weights.json
            loto7_meta_classifier.json
            loto7_hit_structure_clusters.csv
