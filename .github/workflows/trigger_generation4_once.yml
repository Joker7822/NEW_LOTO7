name: Trigger Generation 4 Full Run Once

# run-request: 2026-07-16T11:41:00Z
on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trigger_generation4_once.yml"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: trigger-generation4-once
  cancel-in-progress: true

jobs:
  dispatch-generation4:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Dispatch valid Generation 4 full run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run loto7_generation4_run.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref main \
            -f null_simulations=180
          echo "Dispatched LOTO7 Generation 4 Full Run with null_simulations=180"

      - name: Record successful dispatch
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git reset --hard origin/main
          mkdir -p outputs/generation4
          printf 'requested_at=%s\nsource_commit=%s\nworkflow=loto7_generation4_run.yml\nnull_simulations=180\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${GITHUB_SHA}" \
            > outputs/generation4/dispatch_requested.txt
          git add -f outputs/generation4/dispatch_requested.txt
          git commit -m "Record valid Generation 4 workflow dispatch [skip ci]"
          git push origin HEAD:main
