name: Strict Gates Branch Check

on:
  push:
    branches:
      - agent/strict-statistical-adoption-gates
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  strict-gates-check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile changed modules
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/strict_adoption_gates.py \
            scripts/build_generation4_prediction_strict.py \
            scripts/promote_nested_candidate_strict.py \
            tests/test_strict_adoption_gates.py

      - name: Run strict gate and Generation 4 tests
        run: |
          set -euo pipefail
          python -m unittest \
            tests.test_strict_adoption_gates \
            tests.test_generation4_pipeline -v
