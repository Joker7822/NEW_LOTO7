name: LOTO7 Evolution Trainer Extra Schedule

on:
  workflow_dispatch:
  schedule:
    # Existing LOTO7 Evolution Trainer runs at JST 00:00 / 08:00 / 16:00.
    # This dispatcher adds JST 03:00 / 06:00 / 12:00 / 18:00 / 21:00.
    # Total: 8 automatic runs per day.
    - cron: "0 3,9,12,18,21 * * *"

permissions:
  actions: write
  contents: read

concurrency:
  group: loto7-evolution-extra-schedule-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  dispatch-evolution-trainer:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository context
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Dispatch LOTO7 Evolution Trainer
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run loto7_evolution.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${GITHUB_REF_NAME}" \
            -f reset_state=false \
            -f model_iterations=20 \
            -f model_max_targets=0 \
            -f run_ml_stack=true \
            -f run_complete_ai=true
          echo "Dispatched LOTO7 Evolution Trainer from extra schedule."
