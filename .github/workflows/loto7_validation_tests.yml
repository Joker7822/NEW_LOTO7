name: LOTO7 Validation Tests

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - "pyproject.toml"
      - ".github/workflows/**"
      - "holdout_evaluator.py"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "scripts/build_dual_model_prediction.py"
      - "scripts/enforce_prediction_constraints.py"
      - "scripts/robust_model_metrics.py"
      - "scripts/adaptive_model_safety_guard.py"
      - "scripts/nested_walk_forward_validation.py"
      - "scripts/promote_nested_candidate.py"
      - "scripts/promote_nested_candidate_strict.py"
      - "scripts/check_hit_rate_promotion.py"
      - "scripts/migrate_output_layout.py"
      - "scripts/generation4_core.py"
      - "scripts/build_generation4_prediction.py"
      - "scripts/build_generation4_prediction_strict.py"
      - "scripts/strict_adoption_gates.py"
      - "scripts/null_strategy_league.py"
      - "scripts/evaluation_core.py"
      - "scripts/verify_evaluator_consistency.py"
      - "scripts/update_generation4_shadow_history.py"
      - "scripts/check_prediction_history_results.py"
      - "scripts/repair_holdout_summary.py"
      - "holdout_evaluator.py"
      - "scripts/backtest_role_ensemble.py"
      - "scripts/seal_generation4_prediction.py"
      - "scripts/finalize_generation4_report.py"
      - "scripts/check_repository_architecture.py"
      - "config/repository_layout.json"
      - "config/output_layout.json"
      - "pyproject.toml"
      - "tests/test_prediction_output_consistency.py"
      - "tests/test_robust_validation_and_portfolio.py"
      - "tests/test_generation4_pipeline.py"
      - "tests/test_strict_adoption_gates.py"
      - "tests/test_evaluation_unification.py"
      - "tests/test_nested_promotion_gates.py"
      - "tests/test_package_layout_and_hit_metrics.py"
      - "tests/test_output_layout_compatibility.py"
      - "tests/test_workflow_resume_compatibility.py"
      - ".github/workflows/loto7_generation4_run.yml"
      - ".github/workflows/loto7_nested_walk_forward.yml"
      - ".github/workflows/loto7_validation_tests.yml"

permissions:
  contents: read

concurrency:
  group: loto7-validation-tests-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  validation-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package in editable mode
        run: python -m pip install -e .
      - name: Compile prediction modules
        run: |
          set -euo pipefail
          python -m py_compile \
            src/loto7/__init__.py \
            src/loto7/paths.py \
            src/loto7/evaluation/core.py \
            src/loto7/evaluation/hit_metrics.py \
            src/loto7/evaluation/robust.py \
            src/loto7/validation/hit_rate_gate.py \
            scripts/build_dual_model_prediction.py \
            scripts/enforce_prediction_constraints.py \
            scripts/robust_model_metrics.py \
            scripts/adaptive_model_safety_guard.py \
            scripts/nested_walk_forward_validation.py \
            scripts/promote_nested_candidate.py \
            scripts/promote_nested_candidate_strict.py \
            scripts/check_hit_rate_promotion.py \
            scripts/migrate_output_layout.py \
            scripts/generation4_core.py \
            scripts/build_generation4_prediction.py \
            scripts/build_generation4_prediction_strict.py \
            scripts/strict_adoption_gates.py \
            scripts/null_strategy_league.py \
            scripts/evaluation_core.py \
            scripts/verify_evaluator_consistency.py \
            scripts/update_generation4_shadow_history.py \
            scripts/check_prediction_history_results.py \
            scripts/repair_holdout_summary.py \
            holdout_evaluator.py \
            scripts/backtest_role_ensemble.py \
            scripts/seal_generation4_prediction.py \
            scripts/finalize_generation4_report.py \
            scripts/check_repository_architecture.py \
            tests/test_prediction_output_consistency.py \
            tests/test_robust_validation_and_portfolio.py \
            tests/test_generation4_pipeline.py \
            tests/test_strict_adoption_gates.py \
            tests/test_evaluation_unification.py \
            tests/test_nested_promotion_gates.py \
            tests/test_package_layout_and_hit_metrics.py \
            tests/test_output_layout_compatibility.py \
            tests/test_workflow_resume_compatibility.py
      - name: Run focused validation tests
        run: |
          set -euo pipefail
          python scripts/check_repository_architecture.py --report-only
          python scripts/migrate_output_layout.py --verify-only --manifest /tmp/loto7-layout-manifest.json
          python -m unittest \
            tests.test_prediction_output_consistency \
            tests.test_robust_validation_and_portfolio \
            tests.test_generation4_pipeline \
            tests.test_strict_adoption_gates \
            tests.test_evaluation_unification \
            tests.test_nested_promotion_gates \
            tests.test_package_layout_and_hit_metrics \
            tests.test_output_layout_compatibility \
            tests.test_workflow_resume_compatibility -v
