name: Patch LOTO7 Evolution Schedule Once

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/patch_loto7_evolution_schedule_once.yml"

permissions:
  contents: write

jobs:
  patch-schedule:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Patch loto7_evolution schedule to 8 runs per day
        run: |
          set -euo pipefail
          file=".github/workflows/loto7_evolution.yml"
          tmp="${file}.tmp"
          old='    - cron: "0 15,23,7 * * *"'
          new='    - cron: "0 0,3,6,9,12,15,18,21 * * *"'

          if grep -Fq "$new" "$file"; then
            echo "[OK] schedule is already patched"
          elif grep -Fq "$old" "$file"; then
            awk '
              $0 == "    - cron: \"0 15,23,7 * * *\"" {
                print "    # JST 09:00 / 12:00 / 15:00 / 18:00 / 21:00 / 00:00 / 03:00 / 06:00"
                print "    - cron: \"0 0,3,6,9,12,15,18,21 * * *\""
                next
              }
              { print }
            ' "$file" > "$tmp"
            mv "$tmp" "$file"
            echo "[OK] patched schedule to 8 runs per day"
          else
            echo "target cron line not found" >&2
            exit 1
          fi

      - name: Remove one-shot patch workflow
        run: |
          set -euo pipefail
          git rm .github/workflows/patch_loto7_evolution_schedule_once.yml

      - name: Commit patch
        run: |
          set -euo pipefail
          git add .github/workflows/loto7_evolution.yml
          if git diff --cached --quiet; then
            echo "No schedule changes"
            exit 0
          fi
          git commit -m "Run LOTO7 Evolution Trainer 8 times per day [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"
