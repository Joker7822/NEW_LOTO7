name: Capture Repository Restructure Failure Once

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/capture_restructure_failure_once.yml"

permissions:
  actions: read
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Capture failed log tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p docs/architecture
          gh run view 29538457297 --repo "${GITHUB_REPOSITORY}" --log-failed \
            | tail -n 240 > docs/architecture/repository_restructure_failure_tail.txt
      - name: Commit log tail
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main
          git add -f docs/architecture/repository_restructure_failure_tail.txt
          git commit -m "Capture repository restructure failure log [skip ci]"
          git push origin HEAD:main
