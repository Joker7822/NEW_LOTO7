name: Apply Repository Restructure

# apply-request: 2026-07-17-r5-bundle
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/apply_repository_restructure.yml"

permissions:
  contents: read

concurrency:
  group: apply-repository-restructure-main
  cancel-in-progress: true

jobs:
  restructure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest main
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: Apply Phase-1 repository restructure
        run: |
          set -euo pipefail
          sed -i \
            -e 's/"root_python_moved": false/"root_python_moved": False/' \
            -e 's/"tracked_outputs_deleted": false/"tracked_outputs_deleted": False/' \
            scripts/restructure_repository.py
          python -m py_compile scripts/restructure_repository.py scripts/check_repository_architecture.py
          python scripts/restructure_repository.py --apply

          python - <<'PY'
          import json
          from pathlib import Path

          quick = Path('.github/workflows/loto7_quick_finish.yml')
          text = quick.read_text(encoding='utf-8')
          old = 'outputs/evolution_best_prediction.csv'
          new = 'outputs/diagnostics/quick_finish/evolution_best_prediction.csv'
          text = text.replace(old, new)
          command = '          python merge_evolution_shards.py \\\n'
          mkdir = '          mkdir -p outputs/diagnostics/quick_finish\n'
          if mkdir not in text and command in text:
              text = text.replace(command, mkdir + command, 1)
          quick.write_text(text, encoding='utf-8')

          temporary = [
              Path('outputs/generation4/current_run_snapshot.json'),
              Path('outputs/generation4/current_run_snapshot.txt'),
              Path('outputs/generation4/dispatch_requested.txt'),
          ]
          for path in temporary:
              path.unlink(missing_ok=True)

          ignore = Path('.gitignore')
          ignore_text = ignore.read_text(encoding='utf-8')
          entries = [
              'outputs/generation4/current_run_snapshot.json',
              'outputs/generation4/current_run_snapshot.txt',
              'outputs/generation4/dispatch_requested.txt',
          ]
          for entry in entries:
              if entry not in ignore_text.splitlines():
                  ignore_text += entry + '\n'
          ignore.write_text(ignore_text, encoding='utf-8')

          report = Path('docs/architecture/repository_restructure_report.json')
          payload = json.loads(report.read_text(encoding='utf-8'))
          changed = set(payload.get('changed_paths', []))
          changed.update({
              '.github/workflows/loto7_quick_finish.yml',
              '.gitignore',
              'outputs/generation4/current_run_snapshot.json',
              'outputs/generation4/current_run_snapshot.txt',
              'outputs/generation4/dispatch_requested.txt',
          })
          payload['changed_paths'] = sorted(changed)
          payload['quick_finish_prediction_output'] = new
          payload['temporary_execution_outputs_removed'] = True
          report.write_text(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8')

          markdown = Path('docs/architecture/repository_restructure_report.md')
          md = markdown.read_text(encoding='utf-8')
          if 'Quick Finish prediction isolated' not in md:
              md += '\n- Quick Finish prediction isolated under `outputs/diagnostics/quick_finish/`\n'
              md += '- Temporary execution-control outputs removed and ignored\n'
          markdown.write_text(md, encoding='utf-8')
          PY

      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          python -m pip install --quiet pyyaml
          python - <<'PY'
          from pathlib import Path
          import yaml
          for path in sorted(Path('.github/workflows').glob('*.y*ml')):
              with path.open(encoding='utf-8') as stream:
                  yaml.safe_load(stream)
              print(f'[OK] {path}')
          PY

      - name: Run architecture guard and focused tests
        run: |
          set -euo pipefail
          git diff --check
          python scripts/check_repository_architecture.py
          python -m unittest \
            tests.test_prediction_output_consistency \
            tests.test_robust_validation_and_portfolio \
            tests.test_generation4_pipeline -v

      - name: Refresh repository structure audit
        run: |
          set -euo pipefail
          python scripts/audit_repository_structure.py \
            --json docs/architecture/repository_structure_audit.json \
            --markdown docs/architecture/repository_structure_audit.md

      - name: Build validated change bundle
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import shutil
          import subprocess
          from pathlib import Path

          root = Path('.')
          bundle = Path('repository_restructure_bundle')
          files_dir = bundle / 'files'
          files_dir.mkdir(parents=True, exist_ok=True)

          raw = subprocess.check_output(['git', 'status', '--porcelain=v1', '-z'])
          entries = [item for item in raw.decode('utf-8', errors='replace').split('\0') if item]
          updates = []
          deletions = []
          for entry in entries:
              status = entry[:2]
              path_text = entry[3:]
              if ' -> ' in path_text:
                  path_text = path_text.split(' -> ', 1)[1]
              path = Path(path_text)
              if 'D' in status or not path.exists():
                  deletions.append(path.as_posix())
                  continue
              if path.is_file():
                  destination = files_dir / path
                  destination.parent.mkdir(parents=True, exist_ok=True)
                  shutil.copy2(path, destination)
                  updates.append(path.as_posix())

          manifest = {
              'validated': True,
              'base_sha': subprocess.check_output(['git', 'rev-parse', 'HEAD'], text=True).strip(),
              'updates': sorted(set(updates)),
              'deletions': sorted(set(deletions)),
          }
          (bundle / 'manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(manifest, ensure_ascii=False, indent=2))
          PY

      - name: Upload validated restructure bundle
        uses: actions/upload-artifact@v4
        with:
          name: repository-restructure-validated-bundle
          path: repository_restructure_bundle/**
          if-no-files-found: error

      - name: Upload architecture reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: repository-restructure-reports
          path: |
            docs/architecture/repository_restructure_report.json
            docs/architecture/repository_restructure_report.md
            docs/architecture/repository_architecture_guard.json
            docs/architecture/repository_architecture_guard.md
            docs/architecture/repository_structure_audit.json
            docs/architecture/repository_structure_audit.md
          if-no-files-found: error
