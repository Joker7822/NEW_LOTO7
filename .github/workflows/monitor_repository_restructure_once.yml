name: Monitor Repository Restructure Once

# monitor-request: 2026-07-17-r2
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/monitor_repository_restructure_once.yml"

permissions:
  actions: read
  contents: write

concurrency:
  group: monitor-repository-restructure-once
  cancel-in-progress: true

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Monitor latest restructure run
        id: monitor
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RUN_ID="$(gh run list \
            --repo "${GITHUB_REPOSITORY}" \
            --workflow apply_repository_restructure.yml \
            --branch main \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId')"
          test -n "$RUN_ID"
          set +e
          gh run watch "$RUN_ID" --repo "${GITHUB_REPOSITORY}" --exit-status
          WATCH_EXIT=$?
          set -e
          mkdir -p docs/architecture
          gh run view "$RUN_ID" --repo "${GITHUB_REPOSITORY}" \
            --json databaseId,workflowName,status,conclusion,createdAt,updatedAt,headSha,url,jobs \
            > docs/architecture/repository_restructure_run_status.json
          printf 'run_id=%s\nwatch_exit=%s\nmonitored_at=%s\n' \
            "$RUN_ID" "$WATCH_EXIT" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            > docs/architecture/repository_restructure_run_status.txt
          echo "watch_exit=$WATCH_EXIT" >> "$GITHUB_OUTPUT"

      - name: Commit monitor result
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git pull --rebase --autostash origin main
          git add -f docs/architecture/repository_restructure_run_status.json \
                     docs/architecture/repository_restructure_run_status.txt
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Record repository restructure run status [skip ci]"
          git push origin HEAD:main

      - name: Require success
        env:
          WATCH_EXIT: ${{ steps.monitor.outputs.watch_exit }}
        run: test "$WATCH_EXIT" = "0"
