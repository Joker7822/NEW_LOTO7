name: LOTO7 Canonical Output Sync

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - LOTO7 Evolution Trainer
      - LOTO7 Model Self Evolution
      - LOTO7 Recent Era Self Evolution
      - LOTO7 Nested Walk Forward Validation
      - LOTO7 Generation 4 Production
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: loto7-canonical-output-sync-main
  cancel-in-progress: true

jobs:
  sync-layout:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: python -m pip install -e .

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Pull latest legacy state
        run: |
          set -euo pipefail
          git fetch origin main
          git reset --hard origin/main

      - name: Build canonical output layout
        run: |
          set -euo pipefail
          python scripts/migrate_output_layout.py --manifest outputs/layout_manifest.json
          python -m unittest \
            tests.test_output_layout_compatibility \
            tests.test_workflow_resume_compatibility -v

      - name: Commit compact canonical outputs
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs"
          for DIR in production evidence state diagnostics; do
            if [ -d "outputs/$DIR" ]; then
              cp -a "outputs/$DIR" "$SNAPSHOT/outputs/"
            fi
          done
          cp -f outputs/layout_manifest.json "$SNAPSHOT/outputs/"

          for ATTEMPT in 1 2 3 4; do
            git fetch origin main
            git reset --hard origin/main
            mkdir -p outputs
            for DIR in production evidence state diagnostics; do
              if [ -d "$SNAPSHOT/outputs/$DIR" ]; then
                rm -rf "outputs/$DIR"
                cp -a "$SNAPSHOT/outputs/$DIR" "outputs/$DIR"
              fi
            done
            cp -f "$SNAPSHOT/outputs/layout_manifest.json" outputs/layout_manifest.json
            git add -f \
              outputs/production \
              outputs/evidence \
              outputs/state \
              outputs/diagnostics \
              outputs/layout_manifest.json
            if git diff --cached --quiet; then
              echo "Canonical output layout already current"
              exit 0
            fi
            git commit -m "Sync canonical LOTO7 output layout [skip ci]"
            if git push origin HEAD:main; then exit 0; fi
            sleep $((ATTEMPT * 10))
          done
          exit 1

      - name: Upload canonical layout artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto7-canonical-output-layout
          path: |
            outputs/production/**
            outputs/evidence/**
            outputs/state/**
            outputs/diagnostics/**
            outputs/layout_manifest.json
          if-no-files-found: error
