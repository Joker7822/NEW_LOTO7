name: LOTO7 Evolution Trainer

on:
  workflow_dispatch:
    inputs:
      reset_state:
        description: "Start model self-evolution from scratch"
        required: true
        type: choice
        default: "false"
        options: ["false", "true"]
      model_iterations:
        description: "Integrated model self-evolution iterations. Use standalone workflow for long runs."
        required: false
        default: "20"
      model_max_targets:
        description: "Model-only self-evolution holdout targets. Use 0 for full history."
        required: false
        default: "0"
      run_ml_stack:
        description: "Run ML stack after holdout"
        required: true
        type: choice
        default: "true"
        options: ["true", "false"]
      run_complete_ai:
        description: "Run complete AI after holdout"
        required: true
        type: choice
        default: "true"
        options: ["true", "false"]
  schedule:
    # JST 09:00 / 12:00 / 15:00 / 18:00 / 21:00 / 00:00 / 03:00 / 06:00
    - cron: "0 0,3,6,9,12,15,18,21 * * *"

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-evolution-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
          sudo apt-get update
          sudo apt-get install -y xvfb
      - name: Run scraping script
        run: |
          set +e
          xvfb-run -a python scrapingloto7.py
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::warning::scraping did not complete; using current loto7.csv"
            test -s loto7.csv
          fi
      - name: Commit loto7.csv if changed
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git add loto7.csv || true
          if git diff --cached --quiet; then echo "No loto7.csv changes"; exit 0; fi
          git commit -m "Auto update loto7.csv [skip ci]"
          git push --force-with-lease origin HEAD:"${GITHUB_REF_NAME}"

  evolve:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Pull latest model outputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
      - name: Reset model self-evolution outputs if requested
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_state == 'true' }}
        run: |
          rm -f outputs/model_self_evolution/history.csv || true
          rm -f outputs/model_self_evolution/summary.json || true
          rm -f outputs/model_self_evolution/report.txt || true
          rm -f outputs/model_self_evolution/best_candidate_model.json || true
          rm -f outputs/model_self_evolution/state.json || true
      - name: Run model-only self evolution
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_model_self_evolver.py \
            --iterations "${{ github.event.inputs.model_iterations || '20' }}" \
            --max-targets "${{ github.event.inputs.model_max_targets || '0' }}" \
            --min-train-draws 1 \
            --holdout-start-draw 2 \
            --parent-pool-size 24 \
            --random-parents 6 \
            --exploration-rate 0.25 \
            --stagnation-patience 25 \
            --seed "${{ github.run_id }}" \
            --max-runtime-minutes 220 \
            --safe-exit-minutes 90 \
            --min-roi-delta-percent 0.10 \
            --min-profit-delta 0 \
            --allow-high-grade-drop \
            --apply
      - name: Commit adopted best model and self-evolution outputs
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/model_self_evolution"
          cp -f loto7_best_model.json "$SNAPSHOT/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/*.json "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/*.txt "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/*.csv "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          mkdir -p outputs/model_self_evolution
          cp -f "$SNAPSHOT/loto7_best_model.json" loto7_best_model.json 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/model_self_evolution/* outputs/model_self_evolution/ 2>/dev/null || true
          git add -f loto7_best_model.json outputs/model_self_evolution/*.json outputs/model_self_evolution/*.txt outputs/model_self_evolution/*.csv || true
          if git diff --cached --quiet; then echo "No model self-evolution changes"; exit 0; fi
          git commit -m "Run LOTO7 model self-evolution from main trainer [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Upload model self-evolution artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-model-self-evolution-integrated
          path: |
            loto7_best_model.json
            outputs/model_self_evolution/*.json
            outputs/model_self_evolution/*.txt
            outputs/model_self_evolution/*.csv
          if-no-files-found: ignore

  holdout:
    needs: evolve
    if: ${{ !cancelled() && needs.evolve.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Pull adopted best model
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
      - name: Run full-period holdout backtest with adopted best model
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python holdout_evaluator.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --holdout-start-draw 2 \
            --min-train-draws 1 \
            --purchase-count 5 \
            --output outputs/holdout/holdout_result.csv \
            --summary outputs/holdout/holdout_summary.json \
            --report outputs/holdout/holdout_report.txt \
            --state outputs/holdout/holdout_state.json \
            --resume \
            --progress-every 25 \
            --max-runtime-minutes 330 \
            --safe-exit-minutes 20 \
            --fail-on-missing-prize
      - name: Repair holdout year summary and recent era report
        run: |
          set -euo pipefail
          python scripts/repair_holdout_summary.py \
            --detail outputs/holdout/holdout_result.csv \
            --summary outputs/holdout/holdout_summary.json \
            --recent-summary outputs/holdout/recent_era_summary.json \
            --recent-report outputs/holdout/recent_era_report.txt \
            --recent-start-year 2020
      - name: Commit holdout outputs
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/holdout"
          cp -f outputs/holdout/*.csv "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          cp -f outputs/holdout/*.json "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          cp -f outputs/holdout/*.txt "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          mkdir -p outputs/holdout
          cp -f "$SNAPSHOT"/outputs/holdout/* outputs/holdout/ 2>/dev/null || true
          git add -f outputs/holdout/*.csv outputs/holdout/*.json outputs/holdout/*.txt || true
          if git diff --cached --quiet; then echo "No holdout output changes"; exit 0; fi
          git commit -m "Update LOTO7 holdout backtest outputs [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Upload holdout artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-holdout-backtest-outputs
          path: |
            outputs/holdout/*.csv
            outputs/holdout/*.json
            outputs/holdout/*.txt
          if-no-files-found: ignore

  role-ensemble-backtest:
    needs: holdout
    if: ${{ !cancelled() && needs.holdout.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Pull latest role ensemble inputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
      - name: Run role ensemble backtest
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python scripts/backtest_role_ensemble.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --holdout-start-draw 2 \
            --min-train-draws 1 \
            --purchase-count 5 \
            --overlap-limit 4 \
            --output outputs/role_ensemble/role_ensemble_backtest.csv \
            --summary outputs/role_ensemble/role_ensemble_summary.json \
            --report outputs/role_ensemble/role_ensemble_report.txt \
            --state outputs/role_ensemble/role_ensemble_state.json \
            --resume \
            --progress-every 10 \
            --max-runtime-minutes 320 \
            --safe-exit-minutes 30
      - name: Commit role ensemble backtest outputs
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/role_ensemble"
          cp -f outputs/role_ensemble/*.csv "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/role_ensemble/*.json "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/role_ensemble/*.txt "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"
          mkdir -p outputs/role_ensemble
          cp -f "$SNAPSHOT"/outputs/role_ensemble/* outputs/role_ensemble/ 2>/dev/null || true
          git add -f outputs/role_ensemble/*.csv outputs/role_ensemble/*.json outputs/role_ensemble/*.txt || true
          if git diff --cached --quiet; then echo "No role ensemble backtest changes"; exit 0; fi
          git commit -m "Update LOTO7 role ensemble backtest outputs [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"
      - name: Upload role ensemble backtest artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-role-ensemble-backtest
          path: |
            outputs/role_ensemble/*.csv
            outputs/role_ensemble/*.json
            outputs/role_ensemble/*.txt
          if-no-files-found: ignore

  role-strategy-optimizer:
    needs: role-ensemble-backtest
    if: ${{ !cancelled() && needs['role-ensemble-backtest'].result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Pull latest role backtest outputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
      - name: Optimize role strategy
        run: |
          set -euo pipefail
          python scripts/optimize_role_strategy.py \
            --summary outputs/role_ensemble/role_ensemble_summary.json \
            --output outputs/role_ensemble/role_strategy.json \
            --report outputs/role_ensemble/role_strategy_report.txt \
            --purchase-count 5 \
            --min-completed-draws 80 \
            --max-main-best 1
      - name: Commit role strategy outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/role_ensemble/role_strategy.json outputs/role_ensemble/role_strategy_report.txt || true
          if git diff --cached --quiet; then echo "No role strategy changes"; exit 0; fi
          git commit -m "Update LOTO7 role strategy optimizer outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-role-strategy
          path: |
            outputs/role_ensemble/role_strategy.json
            outputs/role_ensemble/role_strategy_report.txt
          if-no-files-found: ignore

  ml-stack:
    needs: [evolve, holdout]
    if: ${{ !cancelled() && needs.evolve.result == 'success' && needs.holdout.result == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_ml_stack != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Install ML dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ml.txt ]; then python -m pip install -r requirements-ml.txt; fi
      - name: Run ML stack
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_ml_stack.py --csv loto7.csv --output-dir outputs/ml_stack --min-train 60 --max-targets 240 --candidates-per-draw 80 --label label_4plus --optuna-trials 50
      - name: Commit ML outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/ml_stack/*.csv outputs/ml_stack/*.json || true
          if git diff --cached --quiet; then echo "No ML output changes"; exit 0; fi
          git commit -m "Update LOTO7 ML stack outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-ml-stack-outputs
          path: outputs/ml_stack/*
          if-no-files-found: ignore

  complete-ai:
    needs: [evolve, holdout, ml-stack]
    if: ${{ always() && !cancelled() && needs.evolve.result == 'success' && needs.holdout.result == 'success' && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_complete_ai != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Run complete AI system
        env:
          PYTHONUNBUFFERED: "1"
        run: python loto7_complete_ai_system.py --csv loto7.csv --output-dir outputs/complete_ai --monte-carlo-sims 20000 --roi-window 100
      - name: Commit complete AI outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/complete_ai/*.csv outputs/complete_ai/*.json outputs/complete_ai/*.md || true
          if git diff --cached --quiet; then echo "No complete AI output changes"; exit 0; fi
          git commit -m "Update LOTO7 complete AI outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-complete-ai-outputs
          path: outputs/complete_ai/*
          if-no-files-found: ignore

  monitor:
    needs: [evolve, holdout, role-ensemble-backtest, role-strategy-optimizer, ml-stack, complete-ai]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
      - name: Run progress monitor
        run: python loto7_progress_monitor.py
      - name: Commit monitor outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/loto7_progress_summary.json outputs/loto7_progress_summary.md || true
          if git diff --cached --quiet; then echo "No monitor output changes"; exit 0; fi
          git commit -m "Update LOTO7 progress summary [skip ci]"
          git pull --rebase --autostash || true
          git push || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-progress-summary
          path: |
            outputs/loto7_progress_summary.json
            outputs/loto7_progress_summary.md
          if-no-files-found: ignore
