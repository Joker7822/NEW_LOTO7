name: LOTO7 Evolution Trainer

on:
  workflow_dispatch:
    inputs:
      generations:
        description: "Number of evolution generations"
        required: false
        default: "200"
      population:
        description: "Population size per generation"
        required: false
        default: "200"
      max_targets:
        description: "Backtest target count used per genome. Use all for full walk-forward."
        required: false
        default: "all"
      target_stride:
        description: "Backtest target stride"
        required: true
        type: choice
        default: "1"
        options:
          - "1"
          - "2"
      workers:
        description: "Workers inside each shard"
        required: false
        default: "4"
      reset_state:
        description: "Start from scratch instead of resume"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
  schedule:
    - cron: '0 12 * * 5'

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          
      - name: Run scraping script
        run: xvfb-run -a python scrapingloto7.py

      - name: Commit and push loto7.csv if changed
        run: |
          set -e
          BRANCH="${{ steps.br.outputs.branch }}"
          git fetch origin
          git checkout "${BRANCH}"
          if [ -f loto7.csv ]; then git add loto7.csv; fi
          if git diff --cached --quiet; then
            echo "No changes to loto7.csv"
            exit 0
          fi
          git commit -m "Auto update loto7.csv [skip ci]" || true
          git push --force-with-lease origin HEAD:"${BRANCH}" || true

      - name: Reset state if requested
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          rm -f outputs/evolution_state_*.json || true
          rm -f outputs/evolution_history_*.csv || true
          rm -f outputs/evolution_best_summary_*.csv || true
          rm -f outputs/evolution_best_prediction_*.csv || true
          rm -f loto7_best_model*.json || true

      - name: Run FULL evolution mode with resume, shard, and workers
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_evolution_trainer.py \
            --csv loto7.csv \
            --output-dir outputs \
            --best-model loto7_best_model.json \
            --generations "${{ github.event.inputs.generations || '200' }}" \
            --population "${{ github.event.inputs.population || '200' }}" \
            --elite-count 10 \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets "${{ github.event.inputs.max_targets || 'all' }}" \
            --target-stride "${{ github.event.inputs.target_stride || '1' }}" \
            --shard-id "${{ matrix.shard }}" \
            --num-shards 4 \
            --workers "${{ github.event.inputs.workers || '4' }}" \
            --resume \
            --push-every-generation 1 \
            --push-every-genome 0 \
            --push-final

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-evolution-outputs-shard-${{ matrix.shard }}
          path: |
            loto7_best_model*.json
            outputs/evolution_state_*.json
            outputs/evolution_history_*.csv
            outputs/evolution_best_summary_*.csv
            outputs/evolution_best_prediction_*.csv
          if-no-files-found: ignore
