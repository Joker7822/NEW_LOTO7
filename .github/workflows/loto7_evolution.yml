name: LOTO7 Evolution Trainer

on:
  workflow_dispatch:
    inputs:
      evolution_mode:
        description: "Execution mode"
        required: true
        type: choice
        default: "recommended"
        options:
          - "recommended"
          - "full_power"
          - "custom"
      generations:
        description: "Custom generations. Used only when evolution_mode=custom. Kept for compatibility."
        required: false
        default: "60"
      population:
        description: "Custom population. Used only when evolution_mode=custom. Kept for compatibility."
        required: false
        default: "120"
      max_targets:
        description: "Custom max targets. Used only when evolution_mode=custom. Kept for compatibility."
        required: false
        default: "160"
      target_stride:
        description: "Custom target stride. Used only when evolution_mode=custom. Kept for compatibility."
        required: true
        type: choice
        default: "2"
        options:
          - "1"
          - "2"
      workers:
        description: "Workers inside each shard. Kept for compatibility."
        required: false
        default: "2"
      reset_state:
        description: "Start from scratch instead of resume"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      model_iterations:
        description: "Model-only self-evolution iterations"
        required: false
        default: "100"
      model_max_targets:
        description: "Model-only self-evolution holdout targets. Use 0 for full history."
        required: false
        default: "0"
      run_ml_stack:
        description: "Run MemoryBank/MetaClassifier/LightGBM/CatBoost/XGBoost/Optuna/SHAP after evolution"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      run_complete_ai:
        description: "Run complete AI: Meta Ensemble, Master Champion, ROI, Bayesian, Monte Carlo, MCTS, Dashboard"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      run_self_evolve:
        description: "Run managed self-evolution after reports are updated"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      create_self_evolution_pr:
        description: "Create PR when self-evolution proposes changes"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
  schedule:
    # JST 00:00 / 08:00 / 16:00 = UTC 15:00 / 23:00 / 07:00
    - cron: "0 15,23,7 * * *"

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-evolution-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch
        id: br
        run: |
          set -euo pipefail
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scraping script
        run: xvfb-run -a python scrapingloto7.py

      - name: Commit and push loto7.csv if changed
        run: |
          set -euo pipefail
          BRANCH="${{ steps.br.outputs.branch }}"
          git fetch origin "${BRANCH}"
          git pull --rebase --autostash origin "${BRANCH}"

          if [ -f loto7.csv ]; then
            git add loto7.csv
          fi

          if git diff --cached --quiet; then
            echo "No changes to loto7.csv"
            exit 0
          fi

          git commit -m "Auto update loto7.csv [skip ci]"
          git push --force-with-lease origin HEAD:"${BRANCH}"

  evolve:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest model outputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Reset model self-evolution outputs if requested
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_state == 'true' }}
        run: |
          rm -f outputs/model_self_evolution/history.csv || true
          rm -f outputs/model_self_evolution/summary.json || true
          rm -f outputs/model_self_evolution/report.txt || true
          rm -f outputs/model_self_evolution/best_candidate_model.json || true

      - name: Run model-only self evolution
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_model_self_evolver.py \
            --iterations "${{ github.event.inputs.model_iterations || '100' }}" \
            --max-targets "${{ github.event.inputs.model_max_targets || '0' }}" \
            --max-runtime-minutes 340 \
            --safe-exit-minutes 15 \
            --min-roi-delta-percent 0.10 \
            --min-profit-delta 0 \
            --apply

      - name: Commit model self-evolution outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f \
            loto7_best_model.json \
            outputs/model_self_evolution/*.json \
            outputs/model_self_evolution/*.txt \
            outputs/model_self_evolution/*.csv || true
          if git diff --cached --quiet; then
            echo "No model self-evolution changes"
            exit 0
          fi
          git commit -m "Run LOTO7 model self-evolution from main trainer [skip ci]"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload model self-evolution artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-model-self-evolution-integrated
          path: |
            loto7_best_model.json
            outputs/model_self_evolution/*.json
            outputs/model_self_evolution/*.txt
            outputs/model_self_evolution/*.csv
          if-no-files-found: ignore

  holdout:
    needs: evolve
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest model outputs
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "${BRANCH}"
          git pull --rebase --autostash origin "${BRANCH}"

      - name: Merge model candidates
        run: |
          set -euo pipefail
          python merge_evolution_shards.py \
            --csv loto7.csv \
            --purchase-count 5 \
            --min-models 1 \
            --selection-holdout-start-draw 2 \
            --selection-min-train-draws 1 \
            --selection-mode holdout_roi \
            --patterns \
              loto7_best_model.json \
              outputs/model_self_evolution/best_candidate_model.json \
              loto7_best_model_shard*_of_08.json \
              outputs/loto7_best_model_shard*_of_08.json \
            --prediction-mode ensemble \
            --ensemble-candidates-per-model 12 \
            --ensemble-overlap-limit 4 \
            --best-model loto7_best_model.json \
            --prediction outputs/evolution_best_prediction.csv \
            --summary outputs/evolution_merged_summary.json \
            --manifest outputs/run_manifest.json

      - name: Run resumable full-period holdout backtest
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python holdout_evaluator.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --holdout-start-draw 2 \
            --min-train-draws 1 \
            --purchase-count 5 \
            --output outputs/holdout/holdout_result.csv \
            --summary outputs/holdout/holdout_summary.json \
            --report outputs/holdout/holdout_report.txt \
            --state outputs/holdout/holdout_state.json \
            --resume \
            --progress-every 25 \
            --max-runtime-minutes 330 \
            --safe-exit-minutes 20 \
            --fail-on-missing-prize

      - name: Commit holdout outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f \
            loto7_best_model.json \
            outputs/evolution_best_prediction.csv \
            outputs/evolution_merged_summary.json \
            outputs/run_manifest.json \
            outputs/holdout/*.csv \
            outputs/holdout/*.json \
            outputs/holdout/*.txt || true
          if git diff --cached --quiet; then
            echo "No holdout output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 holdout backtest outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload holdout artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-holdout-backtest-outputs
          path: |
            loto7_best_model.json
            outputs/evolution_best_prediction.csv
            outputs/evolution_merged_summary.json
            outputs/run_manifest.json
            outputs/holdout/*.csv
            outputs/holdout/*.json
            outputs/holdout/*.txt
          if-no-files-found: ignore

  ml-stack:
    needs: [evolve, holdout]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_ml_stack != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ml.txt ]; then
            python -m pip install -r requirements-ml.txt
          fi

      - name: Run ML stack
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_ml_stack.py \
            --csv loto7.csv \
            --output-dir outputs/ml_stack \
            --min-train 60 \
            --max-targets 240 \
            --candidates-per-draw 80 \
            --label label_4plus \
            --optuna-trials 50

      - name: Commit ML outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/ml_stack/*.csv outputs/ml_stack/*.json || true
          if git diff --cached --quiet; then
            echo "No ML output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 ML stack outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-ml-stack-outputs
          path: |
            outputs/ml_stack/*.csv
            outputs/ml_stack/*.json
          if-no-files-found: ignore

  complete-ai:
    needs: [evolve, ml-stack]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_complete_ai != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run complete AI system
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_complete_ai_system.py \
            --csv loto7.csv \
            --output-dir outputs/complete_ai \
            --monte-carlo-sims 20000 \
            --roi-window 100

      - name: Commit complete AI outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/complete_ai/*.csv outputs/complete_ai/*.json outputs/complete_ai/*.md || true
          if git diff --cached --quiet; then
            echo "No complete AI output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 complete AI outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload complete AI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-complete-ai-outputs
          path: |
            outputs/complete_ai/*.csv
            outputs/complete_ai/*.json
            outputs/complete_ai/*.md
          if-no-files-found: ignore

  monitor:
    needs: [evolve, holdout, ml-stack, complete-ai]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run progress monitor
        run: python loto7_progress_monitor.py

      - name: Commit monitor outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/loto7_progress_summary.json outputs/loto7_progress_summary.md || true
          if git diff --cached --quiet; then
            echo "No monitor output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 progress summary [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload progress summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-progress-summary
          path: |
            outputs/loto7_progress_summary.json
            outputs/loto7_progress_summary.md
          if-no-files-found: ignore

  self-evolve:
    needs: [evolve, holdout, ml-stack, complete-ai, monitor]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_self_evolve != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Decide self-evolution run window
        id: gate
        run: |
          set -euo pipefail
          SHOULD_RUN="true"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR_UTC="$(date -u +%H)"
            if [ "$HOUR_UTC" != "23" ]; then
              SHOULD_RUN="false"
            fi
          fi
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "[SELF-EVOLVE] should_run=${SHOULD_RUN}"

      - name: Checkout repository
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest outputs
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Run self-evolution diagnosis and apply safe config proposal
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_self_evolver.py \
            --config loto7_self_evolution_config.json \
            --holdout-summary outputs/holdout/holdout_summary.json \
            --model-selection-summary outputs/holdout/model_selection_summary.json \
            --progress-summary outputs/loto7_progress_summary.json \
            --output-dir outputs/self_evolution \
            --apply

      - name: Syntax check
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          python -m py_compile \
            loto7_evolution_trainer.py \
            loto7_precision_evolution_trainer.py \
            merge_evolution_shards.py \
            holdout_evaluator.py \
            loto7_self_evolver.py \
            loto7_model_self_evolver.py
          bash -n scripts/collect_txt_reports.sh

      - name: Collect TXT reports
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          bash scripts/collect_txt_reports.sh outputs/txt_reports

      - name: Detect changes
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        id: changes
        run: |
          set -euo pipefail
          git add -f \
            loto7_self_evolution_config.json \
            outputs/self_evolution/*.json \
            outputs/self_evolution/*.txt \
            outputs/txt_reports/*.txt || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit self-evolution artifacts
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.create_self_evolution_pr == 'false') }}
        run: |
          set -euo pipefail
          git commit -m "Generate LOTO7 self-evolution proposal [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Create self-evolution branch and PR
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.create_self_evolution_pr != 'false') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="auto-evolve/loto7-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Propose LOTO7 self-evolution config update"
          git push origin "$BRANCH"
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --title "LOTO7 self-evolution proposal" \
            --body "Managed self-evolution proposal generated by LOTO7 Evolution Trainer."

      - name: Upload self-evolution artifacts
        if: ${{ always() && steps.gate.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: loto7-self-evolution-outputs
          path: |
            outputs/self_evolution/*.json
            outputs/self_evolution/*.txt
            outputs/txt_reports/*.txt
          if-no-files-found: ignore
