name: LOTO7 Evolution Trainer

on:
  workflow_dispatch:
    inputs:
      evolution_mode:
        description: "Execution mode"
        required: true
        type: choice
        default: "recommended"
        options:
          - "recommended"
          - "full_power"
          - "custom"
      generations:
        description: "Custom generations. Used only when evolution_mode=custom. Increase gradually on resume runs."
        required: false
        default: "60"
      population:
        description: "Custom population. Used only when evolution_mode=custom."
        required: false
        default: "120"
      max_targets:
        description: "Custom max targets. Used only when evolution_mode=custom. Use all only for local/full verification."
        required: false
        default: "160"
      target_stride:
        description: "Custom target stride. Used only when evolution_mode=custom."
        required: true
        type: choice
        default: "2"
        options:
          - "1"
          - "2"
      workers:
        description: "Workers inside each shard"
        required: false
        default: "2"
      reset_state:
        description: "Start from scratch instead of resume"
        required: true
        type: choice
        default: "false"
        options:
          - "false"
          - "true"
      run_ml_stack:
        description: "Run MemoryBank/MetaClassifier/LightGBM/CatBoost/XGBoost/Optuna/SHAP after evolution"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      run_complete_ai:
        description: "Run complete AI: Meta Ensemble, Master Champion, ROI, Bayesian, Monte Carlo, MCTS, Dashboard"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      run_self_evolve:
        description: "Run managed self-evolution after reports are updated"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
      create_self_evolution_pr:
        description: "Create PR when self-evolution proposes changes"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
  schedule:
    # JST 00:00 / 08:00 / 16:00 = UTC 15:00 / 23:00 / 07:00
    - cron: "0 15,23,7 * * *"

permissions:
  contents: write
  pull-requests: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-evolution-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve branch
        id: br
        run: |
          set -euo pipefail
          echo "branch=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run scraping script
        run: xvfb-run -a python scrapingloto7.py

      - name: Commit and push loto7.csv if changed
        run: |
          set -euo pipefail
          BRANCH="${{ steps.br.outputs.branch }}"
          git fetch origin "${BRANCH}"
          git pull --rebase --autostash origin "${BRANCH}"

          if [ -f loto7.csv ]; then
            git add loto7.csv
          fi

          if git diff --cached --quiet; then
            echo "No changes to loto7.csv"
            exit 0
          fi

          git commit -m "Auto update loto7.csv [skip ci]"
          git push --force-with-lease origin HEAD:"${BRANCH}"

  evolve:
    needs: scrape
    runs-on: ubuntu-latest
    timeout-minutes: 340
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Reset state if requested
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.reset_state == 'true' }}
        run: |
          rm -f outputs/evolution_state_*.json || true
          rm -f outputs/evolution_history_*.csv || true
          rm -f outputs/evolution_best_summary_*.csv || true
          rm -f outputs/evolution_best_prediction_*.csv || true
          rm -f loto7_best_model*.json || true
          rm -f outputs/holdout/holdout_state.json || true
          rm -f outputs/holdout/holdout_result.csv || true

      - name: Resolve evolution mode
        id: mode
        run: |
          set -euo pipefail
          MODE="${{ github.event.inputs.evolution_mode || 'recommended' }}"

          if [ "$MODE" = "full_power" ]; then
            GENERATIONS="120"
            POPULATION="240"
            MAX_TARGETS="240"
            TARGET_STRIDE="2"
          elif [ "$MODE" = "custom" ]; then
            GENERATIONS="${{ github.event.inputs.generations || '60' }}"
            POPULATION="${{ github.event.inputs.population || '120' }}"
            MAX_TARGETS="${{ github.event.inputs.max_targets || '160' }}"
            TARGET_STRIDE="${{ github.event.inputs.target_stride || '2' }}"
          else
            MODE="recommended"
            GENERATIONS="60"
            POPULATION="120"
            MAX_TARGETS="160"
            TARGET_STRIDE="2"
          fi

          ELITE_COUNT=$(( POPULATION / 20 ))
          if [ "$ELITE_COUNT" -lt 4 ]; then
            ELITE_COUNT="4"
          fi
          if [ "$ELITE_COUNT" -gt 10 ]; then
            ELITE_COUNT="10"
          fi
          if [ "$ELITE_COUNT" -ge "$POPULATION" ]; then
            ELITE_COUNT=$(( POPULATION - 1 ))
          fi

          echo "mode=${MODE}" >> "$GITHUB_OUTPUT"
          echo "generations=${GENERATIONS}" >> "$GITHUB_OUTPUT"
          echo "population=${POPULATION}" >> "$GITHUB_OUTPUT"
          echo "elite_count=${ELITE_COUNT}" >> "$GITHUB_OUTPUT"
          echo "max_targets=${MAX_TARGETS}" >> "$GITHUB_OUTPUT"
          echo "target_stride=${TARGET_STRIDE}" >> "$GITHUB_OUTPUT"

          echo "[MODE] mode=${MODE} generations=${GENERATIONS} population=${POPULATION} elite_count=${ELITE_COUNT} max_targets=${MAX_TARGETS} target_stride=${TARGET_STRIDE} shards=8 workers=${{ github.event.inputs.workers || '2' }}"

      - name: Run precision evolution mode with resume, shard, and workers
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_precision_evolution_trainer.py \
            --csv loto7.csv \
            --output-dir outputs \
            --best-model loto7_best_model.json \
            --generations "${{ steps.mode.outputs.generations }}" \
            --population "${{ steps.mode.outputs.population }}" \
            --elite-count "${{ steps.mode.outputs.elite_count }}" \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets "${{ steps.mode.outputs.max_targets }}" \
            --target-stride "${{ steps.mode.outputs.target_stride }}" \
            --shard-id "${{ matrix.shard }}" \
            --num-shards 8 \
            --workers "${{ github.event.inputs.workers || '2' }}" \
            --resume \
            --push-every-generation 1 \
            --push-every-genome 25 \
            --max-runtime-minutes 285 \
            --safe-exit-minutes 45 \
            --push-final

      - name: Upload shard artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-evolution-outputs-shard-${{ matrix.shard }}
          path: |
            loto7_best_model*.json
            outputs/evolution_state_*.json
            outputs/evolution_history_*.csv
            outputs/evolution_best_summary_*.csv
            outputs/evolution_best_prediction_*.csv
          if-no-files-found: ignore

  holdout:
    needs: evolve
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest shard outputs
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          git fetch origin "${BRANCH}"
          git pull --rebase --autostash origin "${BRANCH}"

      - name: Merge shard models
        run: |
          set -euo pipefail
          python merge_evolution_shards.py \
            --csv loto7.csv \
            --purchase-count 5 \
            --min-models 1 \
            --selection-holdout-start-draw 2 \
            --selection-min-train-draws 1 \
            --prediction-mode ensemble \
            --ensemble-candidates-per-model 10 \
            --ensemble-overlap-limit 4 \
            --best-model loto7_best_model.json \
            --prediction outputs/evolution_best_prediction.csv \
            --summary outputs/evolution_merged_summary.json \
            --manifest outputs/run_manifest.json

      - name: Run resumable full-period holdout backtest
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python holdout_evaluator.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --holdout-start-draw 2 \
            --min-train-draws 1 \
            --purchase-count 5 \
            --output outputs/holdout/holdout_result.csv \
            --summary outputs/holdout/holdout_summary.json \
            --report outputs/holdout/holdout_report.txt \
            --state outputs/holdout/holdout_state.json \
            --resume \
            --progress-every 25 \
            --max-runtime-minutes 330 \
            --safe-exit-minutes 20 \
            --fail-on-missing-prize

      - name: Commit holdout outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f \
            loto7_best_model.json \
            outputs/evolution_best_prediction.csv \
            outputs/evolution_merged_summary.json \
            outputs/run_manifest.json \
            outputs/holdout/*.csv \
            outputs/holdout/*.json \
            outputs/holdout/*.txt || true
          if git diff --cached --quiet; then
            echo "No holdout output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 holdout backtest outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload holdout artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-holdout-backtest-outputs
          path: |
            loto7_best_model.json
            outputs/evolution_best_prediction.csv
            outputs/evolution_merged_summary.json
            outputs/run_manifest.json
            outputs/holdout/*.csv
            outputs/holdout/*.json
            outputs/holdout/*.txt
          if-no-files-found: ignore

  ml-stack:
    needs: [evolve, holdout]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_ml_stack != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          if [ -f requirements-ml.txt ]; then
            python -m pip install -r requirements-ml.txt
          fi

      - name: Run ML stack
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_ml_stack.py \
            --csv loto7.csv \
            --output-dir outputs/ml_stack \
            --min-train 60 \
            --max-targets 240 \
            --candidates-per-draw 80 \
            --label label_4plus \
            --optuna-trials 50

      - name: Commit ML outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/ml_stack/*.csv outputs/ml_stack/*.json || true
          if git diff --cached --quiet; then
            echo "No ML output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 ML stack outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload ML artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-ml-stack-outputs
          path: |
            outputs/ml_stack/*.csv
            outputs/ml_stack/*.json
          if-no-files-found: ignore

  complete-ai:
    needs: [evolve, ml-stack]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_complete_ai != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run complete AI system
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_complete_ai_system.py \
            --csv loto7.csv \
            --output-dir outputs/complete_ai \
            --monte-carlo-sims 20000 \
            --roi-window 100

      - name: Commit complete AI outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/complete_ai/*.csv outputs/complete_ai/*.json outputs/complete_ai/*.md || true
          if git diff --cached --quiet; then
            echo "No complete AI output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 complete AI outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload complete AI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-complete-ai-outputs
          path: |
            outputs/complete_ai/*.csv
            outputs/complete_ai/*.json
            outputs/complete_ai/*.md
          if-no-files-found: ignore

  monitor:
    needs: [evolve, holdout, ml-stack, complete-ai]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run progress monitor
        run: python loto7_progress_monitor.py

      - name: Commit monitor outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/loto7_progress_summary.json outputs/loto7_progress_summary.md || true
          if git diff --cached --quiet; then
            echo "No monitor output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 progress summary [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload progress summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-progress-summary
          path: |
            outputs/loto7_progress_summary.json
            outputs/loto7_progress_summary.md
          if-no-files-found: ignore

  self-evolve:
    needs: [evolve, holdout, ml-stack, complete-ai, monitor]
    if: ${{ always() && (github.event_name != 'workflow_dispatch' || github.event.inputs.run_self_evolve != 'false') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Decide self-evolution run window
        id: gate
        run: |
          set -euo pipefail
          SHOULD_RUN="true"
          if [ "${{ github.event_name }}" = "schedule" ]; then
            HOUR_UTC="$(date -u +%H)"
            if [ "$HOUR_UTC" != "23" ]; then
              SHOULD_RUN="false"
            fi
          fi
          echo "should_run=${SHOULD_RUN}" >> "$GITHUB_OUTPUT"
          echo "[SELF-EVOLVE] should_run=${SHOULD_RUN}"

      - name: Checkout repository
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest outputs
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Run self-evolution diagnosis and apply safe config proposal
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_self_evolver.py \
            --config loto7_self_evolution_config.json \
            --holdout-summary outputs/holdout/holdout_summary.json \
            --model-selection-summary outputs/holdout/model_selection_summary.json \
            --progress-summary outputs/loto7_progress_summary.json \
            --output-dir outputs/self_evolution \
            --apply

      - name: Read self-evolution decision
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        id: decision
        run: |
          set -euo pipefail
          READY="false"
          DECISION="missing"
          if [ -f outputs/self_evolution/adoption_decision.json ]; then
            READY="$(python -c 'import json,pathlib; data=json.loads(pathlib.Path("outputs/self_evolution/adoption_decision.json").read_text(encoding="utf-8")); print(str(bool(data.get("ready_for_pull_request"))).lower())')"
            DECISION="$(python -c 'import json,pathlib; data=json.loads(pathlib.Path("outputs/self_evolution/adoption_decision.json").read_text(encoding="utf-8")); print(data.get("decision", "missing"))')"
          fi
          echo "ready_for_pull_request=${READY}" >> "$GITHUB_OUTPUT"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          echo "[SELF-EVOLVE] decision=${DECISION} ready_for_pull_request=${READY}"

      - name: Syntax check
        if: ${{ steps.gate.outputs.should_run == 'true' }}
        run: |
          set -euo pipefail
          python -m py_compile \
            loto7_evolution_trainer.py \
            loto7_precision_evolution_trainer.py \
            merge_evolution_shards.py \
            holdout_evaluator.py \
            loto7_self_evolver.py
          bash -n scripts/collect_txt_reports.sh

      - name: Smoke test precision trainer with proposed config
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' }}
        env:
          PYTHONUNBUFFERED: "1"
          DISABLE_GIT_PUSH: "1"
          LOTO7_SELF_EVOLUTION_CONFIG: "loto7_self_evolution_config.json"
        run: |
          set -euo pipefail
          python loto7_precision_evolution_trainer.py \
            --csv loto7.csv \
            --output-dir outputs/self_evolution/smoke \
            --best-model outputs/self_evolution/smoke_best_model.json \
            --state-path outputs/self_evolution/smoke_precision_state.json \
            --generations 1 \
            --population 12 \
            --elite-count 3 \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets 12 \
            --target-stride 5 \
            --shard-id 0 \
            --num-shards 1 \
            --workers 1 \
            --max-runtime-minutes 20 \
            --safe-exit-minutes 5

      - name: Collect TXT reports
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' }}
        run: |
          set -euo pipefail
          bash scripts/collect_txt_reports.sh outputs/txt_reports

      - name: Build PR body
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' }}
        id: body
        run: |
          set -euo pipefail
          BODY_FILE="outputs/self_evolution/pr_body.md"
          {
            echo "## LOTO7 Self-Evolving AI Proposal"
            echo ""
            echo "This PR was generated by the managed self-evolution step integrated into LOTO7 Evolution Trainer."
            echo ""
            echo "### Safety"
            echo "- No direct push to main"
            echo "- Config-only self modification"
            echo "- Python syntax check passed"
            echo "- Precision trainer smoke test passed"
            echo "- TXT reports collected under outputs/txt_reports/"
            echo ""
            echo "### PR Summary"
            echo "\`\`\`text"
            if [ -f outputs/txt_reports/10_pr_summary.txt ]; then
              cat outputs/txt_reports/10_pr_summary.txt
            elif [ -f outputs/self_evolution/comparison_report.txt ]; then
              cat outputs/self_evolution/comparison_report.txt
            else
              echo "No summary report was generated."
            fi
            echo "\`\`\`"
            echo ""
            echo "### TXT Reports"
            echo "See: \`outputs/txt_reports/00_index.txt\` and \`outputs/txt_reports/all_reports.txt\`."
          } > "$BODY_FILE"
          echo "body_file=$BODY_FILE" >> "$GITHUB_OUTPUT"

      - name: Detect changes
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' }}
        id: changes
        run: |
          set -euo pipefail
          git add -f \
            loto7_self_evolution_config.json \
            outputs/self_evolution/diagnosis.json \
            outputs/self_evolution/proposal.json \
            outputs/self_evolution/adoption_decision.json \
            outputs/self_evolution/comparison_report.txt \
            outputs/self_evolution/applied_config.json \
            outputs/self_evolution/pr_body.md \
            outputs/self_evolution/pr_summary.txt \
            outputs/txt_reports/*.txt || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create self-evolution branch and PR
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' && steps.changes.outputs.changed == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.create_self_evolution_pr != 'false') }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          BRANCH="auto-evolve/loto7-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git commit -m "Propose LOTO7 self-evolution config update"
          git push origin "$BRANCH"

          PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/new/${BRANCH}"
          set +e
          gh pr create \
            --base "${GITHUB_REF_NAME}" \
            --head "$BRANCH" \
            --title "LOTO7 self-evolution proposal" \
            --body-file "${{ steps.body.outputs.body_file }}"
          PR_STATUS=$?
          set -e

          if [ "$PR_STATUS" -ne 0 ]; then
            echo "::warning::GitHub Actions could not create the pull request. This usually means repository workflow permissions do not allow Actions to create PRs."
            echo "::warning::Manual PR URL: ${PR_URL}"
            echo "To enable automatic PR creation, open Settings > Actions > General > Workflow permissions and enable 'Allow GitHub Actions to create and approve pull requests'."
            exit 0
          fi

      - name: Keep artifacts when PR disabled
        if: ${{ steps.gate.outputs.should_run == 'true' && steps.decision.outputs.ready_for_pull_request == 'true' && steps.changes.outputs.changed == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.create_self_evolution_pr == 'false' }}
        run: |
          set -euo pipefail
          git commit -m "Generate LOTO7 self-evolution proposal [skip ci]" || true
          echo "PR creation disabled by workflow input."

      - name: Upload self-evolution artifacts
        if: ${{ always() && steps.gate.outputs.should_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: loto7-self-evolution-outputs
          path: |
            outputs/self_evolution/diagnosis.json
            outputs/self_evolution/proposal.json
            outputs/self_evolution/adoption_decision.json
            outputs/self_evolution/comparison_report.txt
            outputs/self_evolution/applied_config.json
            outputs/self_evolution/pr_body.md
            outputs/self_evolution/pr_summary.txt
            outputs/self_evolution/smoke_best_model.json
            outputs/txt_reports/*.txt
          if-no-files-found: ignore
