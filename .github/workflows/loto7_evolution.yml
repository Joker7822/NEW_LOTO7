name: LOTO7 Evolution Trainer

on:
  workflow_dispatch:
    inputs:
      generations:
        description: "Number of evolution generations"
        required: false
        default: "100"
      population:
        description: "Population size per generation"
        required: false
        default: "100"
      max_targets:
        description: "Backtest target count used per genome"
        required: false
        default: "all"
      target_stride:
        description: "1 = every draw, 2 = every other draw"
        required: false
        default: "1"
  schedule:
    - cron: "30 18 * * 5"

permissions:
  contents: write

concurrency:
  group: loto7-evolution
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run FULL evolution mode
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_evolution_trainer.py \
            --csv loto7.csv \
            --output-dir outputs \
            --best-model loto7_best_model.json \
            --generations "${{ github.event.inputs.generations || '100' }}" \
            --population "${{ github.event.inputs.population || '100' }}" \
            --elite-count 10 \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets 999999 \
            --target-stride "${{ github.event.inputs.target_stride || '1' }}" \
            --push-every-generation 1 \
            --push-final

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-evolution-outputs
          path: |
            loto7_best_model.json
            outputs/evolution_history.csv
            outputs/evolution_best_summary.csv
            outputs/evolution_best_prediction.csv
          if-no-files-found: ignore