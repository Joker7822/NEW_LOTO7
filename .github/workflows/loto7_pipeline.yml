name: LOTO7 Pipeline

on:
  workflow_dispatch:
    inputs:
      max_targets:
        description: "Backtest target count. Use all for full resume run."
        required: false
        default: "all"
      run_scraping:
        description: "Update loto7.csv before running."
        required: false
        default: "true"
      force_rebuild:
        description: "Delete existing backtest outputs and rebuild from the first target."
        required: false
        default: "false"
  schedule:
    - cron: "15 11 * * 5"

permissions:
  contents: write

concurrency:
  group: loto7-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prepare outputs directory
        run: |
          mkdir -p outputs
          touch outputs/.keep
          ls -la outputs

      - name: Run LOTO7 pipeline
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          set -euxo pipefail

          MAX_TARGETS="${{ github.event.inputs.max_targets || 'all' }}"
          RUN_SCRAPING="${{ github.event.inputs.run_scraping || 'true' }}"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild || 'false' }}"

          SCRAPE_FLAG=""
          [ "$RUN_SCRAPING" = "true" ] && SCRAPE_FLAG="--run-scraping"

          REBUILD_FLAG=""
          [ "$FORCE_REBUILD" = "true" ] && REBUILD_FLAG="--force-rebuild"

          python loto7_pipeline.py \
            $SCRAPE_FLAG \
            $REBUILD_FLAG \
            --csv loto7.csv \
            --output-dir outputs \
            --resume-state outputs/resume_state.json \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets "$MAX_TARGETS" \
            --push-every 100 \
            --push-final

          echo '===== outputs ====='
          find outputs -type f | sort || true

      - name: Upload outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loto7-outputs
          path: |
            loto7.csv
            outputs/**
          if-no-files-found: warn
