name: LOTO7 ML Stack

on:
  workflow_dispatch:
    inputs:
      max_targets:
        description: "Training target count"
        required: false
        default: "240"
      candidates_per_draw:
        description: "Candidate tickets per target draw"
        required: false
        default: "80"
      optuna_trials:
        description: "Optuna trial count"
        required: false
        default: "50"
      label:
        description: "Meta target label"
        required: true
        type: choice
        default: "label_4plus"
        options:
          - "label_4plus"
          - "label_5plus"

permissions:
  contents: write

defaults:
  run:
    shell: bash

jobs:
  ml-stack:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ML dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ml.txt

      - name: Run ML stack
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_ml_stack.py \
            --csv loto7.csv \
            --output-dir outputs/ml_stack \
            --min-train 60 \
            --max-targets "${{ github.event.inputs.max_targets || '240' }}" \
            --candidates-per-draw "${{ github.event.inputs.candidates_per_draw || '80' }}" \
            --label "${{ github.event.inputs.label || 'label_4plus' }}" \
            --optuna-trials "${{ github.event.inputs.optuna_trials || '50' }}"

      - name: Commit ML outputs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f outputs/ml_stack/*.csv outputs/ml_stack/*.json || true
          if ! git diff --cached --quiet; then
            git commit -m "Update LOTO7 ML stack outputs"
            git pull --rebase --autostash || true
            git push || true
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-ml-stack-outputs
          path: |
            outputs/ml_stack/*.csv
            outputs/ml_stack/*.json
          if-no-files-found: ignore
