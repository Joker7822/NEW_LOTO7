name: NEW_LOTO7 Advanced

on:
  workflow_dispatch:
    inputs:
      run_backtest:
        description: 'Run backtest after prediction'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_backtest_draws:
        description: 'Backtest target draws. 0 = all draws'
        required: false
        default: '300'
      monte_carlo:
        description: 'Prediction MonteCarlo/MCTS iterations'
        required: false
        default: '30000'
      backtest_monte_carlo:
        description: 'Backtest MonteCarlo/MCTS iterations'
        required: false
        default: '2000'
      optuna_trials:
        description: 'Optuna trials'
        required: false
        default: '30'
  schedule:
    # JST 21:00 on Tuesday and Friday
    - cron: '0 12 * * 2,5'

permissions:
  contents: write

concurrency:
  group: loto7-advanced-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      DEFAULT_MONTE_CARLO: '30000'
      DEFAULT_BACKTEST_MONTE_CARLO: '2000'
      DEFAULT_OPTUNA_TRIALS: '30'
      DEFAULT_MAX_BACKTEST_DRAWS: '300'
      PYTHONUNBUFFERED: '1'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install optuna scikit-learn
          fi
          # Optional libraries. Do not fail the workflow if wheels are unavailable.
          pip install scikit-learn || true
          pip install catboost || true

      - name: Compile check
        run: |
          python -m py_compile loto7_logic_predictor.py
          python -m py_compile loto7_enhanced_predictor.py || true
          python -m py_compile loto7_advanced_optimizer.py || true
          python -m py_compile loto7_advanced_v2.py || true

      - name: Resolve runtime settings
        id: settings
        shell: bash
        run: |
          MC="${{ github.event.inputs.monte_carlo || '' }}"
          BMC="${{ github.event.inputs.backtest_monte_carlo || '' }}"
          TRIALS="${{ github.event.inputs.optuna_trials || '' }}"
          MAXDRAWS="${{ github.event.inputs.max_backtest_draws || '' }}"

          echo "monte_carlo=${MC:-$DEFAULT_MONTE_CARLO}" >> "$GITHUB_OUTPUT"
          echo "backtest_monte_carlo=${BMC:-$DEFAULT_BACKTEST_MONTE_CARLO}" >> "$GITHUB_OUTPUT"
          echo "optuna_trials=${TRIALS:-$DEFAULT_OPTUNA_TRIALS}" >> "$GITHUB_OUTPUT"
          echo "max_backtest_draws=${MAXDRAWS:-$DEFAULT_MAX_BACKTEST_DRAWS}" >> "$GITHUB_OUTPUT"

      - name: Run advanced prediction
        env:
          LOTO7_MONTE_CARLO: ${{ steps.settings.outputs.monte_carlo }}
          LOTO7_BACKTEST_MONTE_CARLO: ${{ steps.settings.outputs.backtest_monte_carlo }}
          LOTO7_OPTUNA_TRIALS: ${{ steps.settings.outputs.optuna_trials }}
          LOTO7_MCTS_ITERATIONS: ${{ steps.settings.outputs.monte_carlo }}
        run: |
          python loto7_logic_predictor.py \
            --tickets 10 \
            --pool-size 24 \
            --save-count 10 \
            --monte-carlo "${LOTO7_MONTE_CARLO}"

      - name: Run optional resumable backtest
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_backtest == 'true' }}
        env:
          LOTO7_MONTE_CARLO: ${{ steps.settings.outputs.monte_carlo }}
          LOTO7_BACKTEST_MONTE_CARLO: ${{ steps.settings.outputs.backtest_monte_carlo }}
          LOTO7_OPTUNA_TRIALS: ${{ steps.settings.outputs.optuna_trials }}
          LOTO7_MCTS_ITERATIONS: ${{ steps.settings.outputs.backtest_monte_carlo }}
          MAX_BACKTEST_DRAWS: ${{ steps.settings.outputs.max_backtest_draws }}
        run: |
          if [ -f loto7_advanced_v2.py ]; then
            python - <<'PY'
          import os
          from loto7_logic_predictor import load_draws
          from loto7_advanced_v2 import backtest_resume_v2, cluster_hit_structures, train_meta_classifier

          draws = load_draws("loto7.csv")
          max_draws = int(os.environ.get("MAX_BACKTEST_DRAWS", "300"))
          min_train = max(1, len(draws) - max_draws) if max_draws > 0 else 1

          summary = backtest_resume_v2(
              draws=draws,
              min_train=min_train,
              num_tickets=10,
              pool_size=16,
              detail_csv="loto7_backtest_detail.csv",
              summary_csv="loto7_backtest_summary.csv",
              push_every=100,
          )
          cluster_hit_structures("loto7_backtest_detail.csv")
          train_meta_classifier("loto7_backtest_detail.csv")
          print(summary)
          PY
          else
            python loto7_logic_predictor.py \
              --backtest \
              --min-train 1 \
              --max-backtest-draws "${MAX_BACKTEST_DRAWS}" \
              --tickets 10 \
              --backtest-pool-size 16 \
              --backtest-monte-carlo "${LOTO7_BACKTEST_MONTE_CARLO}"
          fi

      - name: Commit and push results
        shell: bash
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add \
            loto7_predictions.csv \
            latest_loto7_prediction.txt \
            loto7_backtest_summary.csv \
            loto7_backtest_detail.csv \
            loto7_backtest_report.txt \
            loto7_backtest_resume.json \
            loto7_memorybank.csv \
            loto7_memorybank_5plus.csv \
            loto7_advanced_weights.json \
            loto7_hit_structure_clusters.csv \
            loto7_meta_classifier.json \
            || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "auto update loto7 advanced results"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin "HEAD:${GITHUB_REF_NAME}"
