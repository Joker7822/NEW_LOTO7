name: NEW_LOTO7 Advanced

on:
  workflow_dispatch:
    inputs:
      tickets:
        description: 'Number of latest prediction tickets'
        required: true
        default: '5'
      pool_size:
        description: 'Latest prediction pool size'
        required: true
        default: '24'
      run_backtest:
        description: 'Advance leakage-safe chunked backtest before training/prediction'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      chunk_size:
        description: 'Backtest target draws per checkpoint'
        required: true
        default: '100'
      max_chunks:
        description: 'Backtest chunks per workflow run; default 10 means up to 1000 draws'
        required: true
        default: '10'
  schedule:
    - cron: '0 12 * * 5'

permissions:
  contents: write
  actions: write

concurrency:
  group: new-loto7-advanced-${{ github.ref }}
  cancel-in-progress: false

jobs:
  backtest_train_predict:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Advance leakage-safe chunked backtest
        env:
          LOTO7_POOL_SIZE: ${{ github.event.inputs.pool_size || '24' }}
          LOTO7_BACKTEST_CHUNK_SIZE: ${{ github.event.inputs.chunk_size || '100' }}
          LOTO7_BACKTEST_MAX_CHUNKS: ${{ github.event.inputs.max_chunks || '10' }}
        run: |
          python loto7_chunked_backtest.py --csv loto7.csv --min-train 1 --tickets 5 --pool-size "${LOTO7_POOL_SIZE}" --chunk-size "${LOTO7_BACKTEST_CHUNK_SIZE}" --max-chunks "${LOTO7_BACKTEST_MAX_CHUNKS}"

      - name: Save latest prediction using trained artifacts
        run: |
          TICKETS="${{ github.event.inputs.tickets || '5' }}"
          POOL_SIZE="${{ github.event.inputs.pool_size || '24' }}"
          python loto7_logic_predictor.py --csv loto7.csv --tickets "$TICKETS" --pool-size "$POOL_SIZE" --save-count "$TICKETS" --disable-optimize
