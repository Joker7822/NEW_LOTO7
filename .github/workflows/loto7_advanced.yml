name: NEW_LOTO7 Advanced

on:
  workflow_dispatch:
    inputs:
      tickets:
        required: true
        default: '10'
      pool_size:
        required: true
        default: '24'
      run_backtest:
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      max_backtest_draws:
        required: true
        default: '0'
  schedule:
    - cron: '0 12 * * 5'

permissions:
  contents: write

concurrency:
  group: new-loto7-advanced-${{ github.ref }}
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - run: |
          python -m py_compile loto7_logic_predictor.py loto7_advanced_optimizer.py loto7_enhanced_predictor.py loto7_nextgen_models.py

      - name: Prediction
        env:
          LOTO7_DISABLE_OPTIMIZE: '1'
          LOTO7_MONTE_CARLO: '3000'
          LOTO7_DIFFUSION_CANDIDATES: '300'
          LOTO7_PPO_CANDIDATES: '300'
          LOTO7_MCTS_ITERATIONS: '300'
        run: |
          python loto7_logic_predictor.py --csv loto7.csv --tickets 10 --pool-size 24 --save-count 10 --disable-optimize

      - name: Full resumable backtest
        if: ${{ github.event.inputs.run_backtest == 'true' }}
        env:
          LOTO7_DISABLE_OPTIMIZE: '1'
          LOTO7_BACKTEST_RESUME: '1'
          LOTO7_PUSH_EVERY: '100'
          LOTO7_BACKTEST_MONTE_CARLO: '100'
          LOTO7_BACKTEST_MCTS: '50'
          LOTO7_DIFFUSION_CANDIDATES: '50'
          LOTO7_PPO_CANDIDATES: '50'
        run: |
          python loto7_logic_predictor.py \
            --csv loto7.csv \
            --backtest \
            --min-train 1 \
            --tickets 10 \
            --pool-size 12 \
            --backtest-pool-size 8 \
            --backtest-pool-cap 8 \
            --max-backtest-draws ${{ github.event.inputs.max_backtest_draws || '0' }} \
            --disable-optimize

      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add .
          git diff --cached --quiet && exit 0 || true
          git commit -m 'auto update NEW_LOTO7 prediction'
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git push origin HEAD:main && exit 0
            sleep $((i*5))
          done
          exit 1