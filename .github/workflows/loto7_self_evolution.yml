name: LOTO7 Self Evolution

on:
  workflow_dispatch:
    inputs:
      children:
        description: "Number of bred champion children"
        required: false
        default: "64"
  workflow_run:
    workflows:
      - LOTO7 Evolution Trainer
    types:
      - completed

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-self-evolution-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  self-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run self evolution engine
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_self_evolution_engine.py \
            --output-dir outputs/self_evolution \
            --children "${{ github.event.inputs.children || '64' }}"

      - name: Commit self evolution outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/self_evolution/*.csv outputs/self_evolution/*.json outputs/self_evolution/*.md || true
          if git diff --cached --quiet; then
            echo "No self evolution output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 self evolution outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload self evolution artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-self-evolution-outputs
          path: |
            outputs/self_evolution/*.csv
            outputs/self_evolution/*.json
            outputs/self_evolution/*.md
          if-no-files-found: ignore
