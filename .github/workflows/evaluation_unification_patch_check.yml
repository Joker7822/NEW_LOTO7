name: Evaluation Unification Patch Check

on:
  push:
    branches:
      - fix/unify-evaluation-live-results
    paths:
      - ".github/workflows/evaluation_unification_patch_check.yml"

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/unify-evaluation-live-results

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Apply evaluator unification patch
        run: |
          set -euo pipefail
          python -c 'from pathlib import Path; p=Path("scripts/apply_evaluation_unification_patch.py"); s=p.read_text(encoding="utf-8"); s=s.replace("if count != 1:\n        raise RuntimeError(f\"{path}: expected one exact match, found {count}: {old[:100]!r}\")", "if count < 1:\n        raise RuntimeError(f\"{path}: expected at least one exact match, found {count}: {old[:100]!r}\")", 1); exec(compile(s, str(p), "exec"))'

      - name: Compile changed modules
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/evaluation_core.py \
            scripts/verify_evaluator_consistency.py \
            holdout_evaluator.py \
            scripts/backtest_role_ensemble.py \
            scripts/check_prediction_history_results.py \
            scripts/update_generation4_shadow_history.py \
            tests/test_evaluation_unification.py

      - name: Run regression tests
        run: |
          set -euo pipefail
          python -m unittest \
            tests.test_evaluation_unification \
            tests.test_prediction_output_consistency \
            tests.test_robust_validation_and_portfolio \
            tests.test_generation4_pipeline \
            tests.test_strict_adoption_gates -v

      - name: Validate workflow YAML
        run: |
          set -euo pipefail
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/loto7_evolution.yml"); YAML.load_file(".github/workflows/loto7_generation4_run.yml"); YAML.load_file(".github/workflows/loto7_validation_tests.yml"); puts "workflow YAML valid"'

      - name: Commit patched implementation
        run: |
          set -euo pipefail
          git add -A
          if git diff --cached --quiet; then
            echo "No patch changes"
            exit 0
          fi
          git commit -m "Unify LOTO7 evaluators and refresh live results on rejection"
          git push origin HEAD:fix/unify-evaluation-live-results
