name: Run Loto7 Predictor

on:
  workflow_dispatch:
    inputs:
      run_backtest:
        description: "Run backtest after prediction"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      save_count:
        description: "Number of predictions to save"
        required: false
        default: "10"
      min_train:
        description: "Initial training draws for backtest. Use 1 to test from draw 2."
        required: false
        default: "1"
      backtest_pool_size:
        description: "Candidate pool size for backtest. Smaller is faster."
        required: false
        default: "19"
      scrape_months:
        description: "Recent months to scrape before prediction"
        required: false
        default: "3"
  schedule:
    # JST Friday 21:30 = UTC Friday 12:30
    - cron: "30 12 * * 5"

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.11"
  LOTO7_CSV: "loto7.csv"
  OUTPUT_CSV: "loto7_predictions.csv"
  OUTPUT_TXT: "latest_loto7_prediction.txt"
  BACKTEST_CSV: "loto7_backtest_summary.csv"
  BACKTEST_RESULT_TXT: "loto7_backtest_result.txt"
  BACKTEST_RESULT_CSV: "loto7_backtest_result.csv"

jobs:
  predict:
    name: Update data and generate Loto7 predictions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Show Python version
        run: python --version

      - name: Update loto7.csv
        shell: bash
        run: |
          set -euo pipefail

          SCRAPE_MONTHS="${{ github.event.inputs.scrape_months || '3' }}"

          python scrapingloto7.py \
            --csv "$LOTO7_CSV" \
            --months "$SCRAPE_MONTHS"

      - name: Run predictor
        shell: bash
        run: |
          set -euo pipefail

          SAVE_COUNT="${{ github.event.inputs.save_count || '25' }}"
          RUN_BACKTEST="${{ github.event.inputs.run_backtest || 'false' }}"
          MIN_TRAIN="${{ github.event.inputs.min_train || '1' }}"
          BACKTEST_POOL_SIZE="${{ github.event.inputs.backtest_pool_size || '19' }}"

          if [ "$RUN_BACKTEST" = "true" ]; then
            python loto7_logic_predictor.py \
              --csv "$LOTO7_CSV" \
              --output-csv "$OUTPUT_CSV" \
              --save-count "$SAVE_COUNT" \
              --backtest \
              --min-train "$MIN_TRAIN" \
              --backtest-pool-size "$BACKTEST_POOL_SIZE" \
              --backtest-output-csv "$BACKTEST_CSV"
          else
            python loto7_logic_predictor.py \
              --csv "$LOTO7_CSV" \
              --output-csv "$OUTPUT_CSV" \
              --save-count "$SAVE_COUNT"
          fi

      - name: Export latest prediction text
        shell: bash
        run: |
          set -euo pipefail

          SAVE_COUNT="${{ github.event.inputs.save_count || '25' }}"

          python export_latest_prediction_txt.py \
            --input-csv "$OUTPUT_CSV" \
            --output-txt "$OUTPUT_TXT" \
            --max-predictions "$SAVE_COUNT"

      - name: Export backtest result summary
        shell: bash
        run: |
          set -euo pipefail

          if [ -f "$BACKTEST_CSV" ]; then
            python summarize_backtest_results.py \
              --input-csv "$BACKTEST_CSV" \
              --output-txt "$BACKTEST_RESULT_TXT" \
              --output-csv "$BACKTEST_RESULT_CSV"
          else
            echo "$BACKTEST_CSV was not generated. Skip backtest summary export."
          fi

      - name: Show generated files
        shell: bash
        run: |
          set -euo pipefail
          ls -la

          echo "--- ${LOTO7_CSV} preview ---"
          if [ -f "$LOTO7_CSV" ]; then
            tail -n 5 "$LOTO7_CSV"
          else
            echo "$LOTO7_CSV was not generated."
            exit 1
          fi

          echo "--- ${OUTPUT_CSV} preview ---"
          if [ -f "$OUTPUT_CSV" ]; then
            tail -n 5 "$OUTPUT_CSV"
          else
            echo "$OUTPUT_CSV was not generated."
            exit 1
          fi

          echo "--- ${OUTPUT_TXT} preview ---"
          if [ -f "$OUTPUT_TXT" ]; then
            cat "$OUTPUT_TXT"
          else
            echo "$OUTPUT_TXT was not generated."
            exit 1
          fi

          echo "--- ${BACKTEST_CSV} preview ---"
          if [ -f "$BACKTEST_CSV" ]; then
            head -n 5 "$BACKTEST_CSV"
            tail -n 5 "$BACKTEST_CSV"
          else
            echo "$BACKTEST_CSV was not generated. This is OK when run_backtest=false."
          fi

          echo "--- ${BACKTEST_RESULT_TXT} preview ---"
          if [ -f "$BACKTEST_RESULT_TXT" ]; then
            cat "$BACKTEST_RESULT_TXT"
          else
            echo "$BACKTEST_RESULT_TXT was not generated. This is OK when run_backtest=false."
          fi

          echo "--- ${BACKTEST_RESULT_CSV} preview ---"
          if [ -f "$BACKTEST_RESULT_CSV" ]; then
            cat "$BACKTEST_RESULT_CSV"
          else
            echo "$BACKTEST_RESULT_CSV was not generated. This is OK when run_backtest=false."
          fi

      - name: Commit prediction outputs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$LOTO7_CSV" "$OUTPUT_CSV" "$OUTPUT_TXT"
          if [ -f "$BACKTEST_CSV" ]; then
            git add "$BACKTEST_CSV"
          fi
          if [ -f "$BACKTEST_RESULT_TXT" ]; then
            git add "$BACKTEST_RESULT_TXT"
          fi
          if [ -f "$BACKTEST_RESULT_CSV" ]; then
            git add "$BACKTEST_RESULT_CSV"
          fi

          if git diff --cached --quiet; then
            echo "No prediction changes to commit."
            exit 0
          fi

          git commit -m "Update Loto7 data and prediction outputs"
          git push
