name: LOTO7 Deep AI

on:
  workflow_dispatch:
    inputs:
      seq_len:
        description: "Transformer sequence length"
        required: false
        default: "24"
      transformer_epochs:
        description: "Transformer epochs"
        required: false
        default: "20"
      ppo_epochs:
        description: "PPO epochs"
        required: false
        default: "20"
      ppo_episodes:
        description: "PPO episodes per epoch"
        required: false
        default: "128"
  workflow_run:
    workflows:
      - LOTO7 Self Evolution
    types:
      - completed

permissions:
  contents: write

defaults:
  run:
    shell: bash

concurrency:
  group: loto7-deep-ai-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deep-ai:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deep learning dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements-deep.txt

      - name: Run PPO and Transformer predictor
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          python loto7_deep_ai.py \
            --csv loto7.csv \
            --output-dir outputs/deep_ai \
            --seq-len "${{ github.event.inputs.seq_len || '24' }}" \
            --transformer-epochs "${{ github.event.inputs.transformer_epochs || '20' }}" \
            --ppo-epochs "${{ github.event.inputs.ppo_epochs || '20' }}" \
            --ppo-episodes "${{ github.event.inputs.ppo_episodes || '128' }}"

      - name: Commit deep AI outputs
        if: always()
        run: |
          set -euo pipefail
          git add -f outputs/deep_ai/*.csv outputs/deep_ai/*.json outputs/deep_ai/*.md outputs/deep_ai/*.pt || true
          if git diff --cached --quiet; then
            echo "No deep AI output changes"
            exit 0
          fi
          git commit -m "Update LOTO7 deep AI outputs [skip ci]"
          git pull --rebase --autostash || true
          git push || true

      - name: Upload deep AI artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-deep-ai-outputs
          path: |
            outputs/deep_ai/*.csv
            outputs/deep_ai/*.json
            outputs/deep_ai/*.md
            outputs/deep_ai/*.pt
          if-no-files-found: ignore
