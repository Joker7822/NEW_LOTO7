name: Evaluator Full Data Check

on:
  push:
    branches:
      - fix/unify-evaluation-live-results
    paths:
      - ".github/workflows/evaluator_full_data_check.yml"

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/unify-evaluation-live-results

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Compile and run regression tests
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/evaluation_core.py \
            scripts/verify_evaluator_consistency.py \
            holdout_evaluator.py \
            scripts/backtest_role_ensemble.py \
            scripts/check_prediction_history_results.py \
            scripts/update_generation4_shadow_history.py \
            tests/test_evaluation_unification.py
          python -m unittest \
            tests.test_evaluation_unification \
            tests.test_prediction_output_consistency \
            tests.test_robust_validation_and_portfolio \
            tests.test_generation4_pipeline \
            tests.test_strict_adoption_gates -v

      - name: Regenerate all best-model tickets and compare with holdout
        run: |
          set -euo pipefail
          cat > /tmp/full_evaluator_check.py <<'PY'
          from __future__ import annotations

          import csv
          import json
          import os
          from concurrent.futures import ProcessPoolExecutor
          from pathlib import Path

          from loto7_evolution_trainer import evaluate_ticket, generate_tickets, load_best_model, load_draws
          from scripts.evaluation_core import EVALUATOR_VERSION, financial_metrics, load_prize_rows, prize_amount_for_rank

          DRAWS = []
          GENOME = None
          PRIZES = {}

          def init_worker(csv_path: str, model_path: str) -> None:
              global DRAWS, GENOME, PRIZES
              DRAWS = load_draws(csv_path)
              GENOME = load_best_model(model_path)
              PRIZES = load_prize_rows(csv_path)
              if GENOME is None:
                  raise RuntimeError(f"cannot load model: {model_path}")

          def evaluate_index(index: int):
              target = DRAWS[index]
              tickets = generate_tickets(DRAWS[:index], GENOME, 5)
              prize_row = PRIZES.get(target.draw_no, {})
              rows = []
              for ticket_index, ticket in enumerate(tickets, start=1):
                  main_match, bonus_match, rank = evaluate_ticket(ticket, target)
                  rows.append({
                      "draw_no": target.draw_no,
                      "ticket_index": ticket_index,
                      "ticket": " ".join(f"{number:02d}" for number in ticket),
                      "main_match": main_match,
                      "bonus_match": bonus_match,
                      "rank": rank,
                      "payout": prize_amount_for_rank(prize_row, rank),
                  })
              return rows

          def main() -> None:
              holdout_path = Path("outputs/holdout/holdout_result.csv")
              with holdout_path.open("r", encoding="utf-8-sig", newline="") as stream:
                  holdout_rows = list(csv.DictReader(stream))
              expected = {
                  (int(row["draw_no"]), int(row["combo_index"])): {
                      "ticket": " ".join(f"{int(token):02d}" for token in row["ticket"].split()),
                      "main_match": int(row["main_match"]),
                      "bonus_match": int(row["bonus_match"]),
                      "rank": row["rank"],
                      "payout": int(row["prize_amount"]),
                  }
                  for row in holdout_rows
              }
              draws = load_draws("loto7.csv")
              wanted_draws = {draw_no for draw_no, _ in expected}
              target_indices = [index for index, draw in enumerate(draws) if draw.draw_no in wanted_draws]
              workers = max(1, min(8, os.cpu_count() or 1))
              actual = {}
              with ProcessPoolExecutor(
                  max_workers=workers,
                  initializer=init_worker,
                  initargs=("loto7.csv", "loto7_best_model.json"),
              ) as executor:
                  for rows in executor.map(evaluate_index, target_indices, chunksize=1):
                      for row in rows:
                          actual[(row["draw_no"], row["ticket_index"])] = row

              missing = sorted(set(expected) - set(actual))
              extra = sorted(set(actual) - set(expected))
              mismatches = []
              for key in sorted(set(expected) & set(actual)):
                  left = expected[key]
                  right = actual[key]
                  differences = {
                      field: [left[field], right[field]]
                      for field in ("ticket", "main_match", "bonus_match", "rank", "payout")
                      if left[field] != right[field]
                  }
                  if differences:
                      mismatches.append({"draw_no": key[0], "ticket_index": key[1], "differences": differences})

              total_payout = sum(row["payout"] for row in actual.values())
              winning_tickets = sum(1 for row in actual.values() if row["rank"] != "外れ")
              winning_draws = len({key[0] for key, row in actual.items() if row["rank"] != "外れ"})
              metrics = financial_metrics(
                  total_cost=len(actual) * 300,
                  total_payout=total_payout,
                  total_tickets=len(actual),
                  winning_tickets=winning_tickets,
                  target_draws=len(target_indices),
                  winning_draws=winning_draws,
              )
              payload = {
                  "kind": "loto7_full_evaluator_consistency",
                  "evaluator_version": EVALUATOR_VERSION,
                  "workers": workers,
                  "target_draws": len(target_indices),
                  "expected_tickets": len(expected),
                  "regenerated_tickets": len(actual),
                  "missing_count": len(missing),
                  "extra_count": len(extra),
                  "mismatch_count": len(mismatches),
                  "mismatch_samples": mismatches[:20],
                  "metrics": metrics,
                  "passed": not missing and not extra and not mismatches and len(actual) == 3425,
              }
              output = Path("outputs/role_ensemble/evaluator_consistency.json")
              output.parent.mkdir(parents=True, exist_ok=True)
              output.write_text(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + "\n", encoding="utf-8")
              print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
              if not payload["passed"]:
                  raise SystemExit(2)

          if __name__ == "__main__":
              main()
          PY
          python /tmp/full_evaluator_check.py

      - name: Clean Role backtest subset consistency
        run: |
          set -euo pipefail
          rm -f /tmp/role_subset.csv /tmp/role_subset.json /tmp/role_subset.txt /tmp/role_subset_state.json /tmp/holdout_subset.csv
          python scripts/backtest_role_ensemble.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --holdout-start-draw 2 \
            --min-train-draws 1 \
            --purchase-count 5 \
            --overlap-limit 4 \
            --max-targets 12 \
            --output /tmp/role_subset.csv \
            --summary /tmp/role_subset.json \
            --report /tmp/role_subset.txt \
            --state /tmp/role_subset_state.json \
            --no-resume \
            --max-runtime-minutes 45 \
            --safe-exit-minutes 5
          python - <<'PY'
          import csv
          from pathlib import Path

          role_path = Path('/tmp/role_subset.csv')
          with role_path.open('r', encoding='utf-8-sig', newline='') as stream:
              draw_nos = {int(row['target_draw_no']) for row in csv.DictReader(stream) if row['system'] == 'best_model'}
          source = Path('outputs/holdout/holdout_result.csv')
          target = Path('/tmp/holdout_subset.csv')
          with source.open('r', encoding='utf-8-sig', newline='') as stream:
              reader = csv.DictReader(stream)
              rows = [row for row in reader if int(row['draw_no']) in draw_nos]
              fields = reader.fieldnames
          with target.open('w', encoding='utf-8', newline='') as stream:
              writer = csv.DictWriter(stream, fieldnames=fields)
              writer.writeheader()
              writer.writerows(rows)
          print(f'subset draws={len(draw_nos)} holdout rows={len(rows)}')
          PY
          python scripts/verify_evaluator_consistency.py \
            --holdout /tmp/holdout_subset.csv \
            --role /tmp/role_subset.csv \
            --output outputs/role_ensemble/evaluator_consistency_subset.json \
            --unit-cost 300

      - name: Refresh live results in rejection-safe mode
        run: |
          set -euo pipefail
          cp -f outputs/generation4/shadow_history.csv /tmp/shadow_before.csv
          python scripts/check_prediction_history_results.py \
            --history outputs/evolution_prediction_history.csv \
            --csv loto7.csv \
            --output outputs/evolution_prediction_history_result.txt
          python scripts/update_generation4_shadow_history.py \
            --csv loto7.csv \
            --latest-shadow outputs/generation4/latest_shadow_predictions.json \
            --history outputs/generation4/shadow_history.csv \
            --summary outputs/generation4/champion_challenger_summary.json \
            --report outputs/generation4/champion_challenger_report.txt \
            --challenger generation4 \
            --champion beam_baseline \
            --promotion-threshold 20 \
            --min-evaluated-draws 30 \
            --evaluate-only
          python - <<'PY'
          import csv
          import json
          from pathlib import Path

          def keys(path):
              with Path(path).open('r', encoding='utf-8-sig', newline='') as stream:
                  return {(row.get('prediction_draw_no', ''), row.get('strategy', '')) for row in csv.DictReader(stream)}

          before = keys('/tmp/shadow_before.csv')
          after = keys('outputs/generation4/shadow_history.csv')
          summary = json.loads(Path('outputs/generation4/champion_challenger_summary.json').read_text(encoding='utf-8'))
          payload = {
              'kind': 'loto7_rejection_safe_live_refresh_check',
              'before_row_keys': len(before),
              'after_row_keys': len(after),
              'keys_unchanged': before == after,
              'update_mode': summary.get('update_mode'),
              'evaluated_rows': summary.get('evaluated_rows'),
              'pending_rows': summary.get('pending_rows'),
              'passed': before == after and summary.get('update_mode') == 'evaluate_only',
          }
          output = Path('outputs/generation4/rejection_live_refresh_check.json')
          output.write_text(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n', encoding='utf-8')
          print(json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True))
          if not payload['passed']:
              raise SystemExit(2)
          PY

      - name: Validate production workflow ordering and YAML
        run: |
          set -euo pipefail
          ruby -e 'require "yaml"; YAML.load_file(".github/workflows/loto7_generation4_run.yml"); YAML.load_file(".github/workflows/loto7_validation_tests.yml"); puts "workflow YAML valid"'
          python - <<'PY'
          from pathlib import Path
          text = Path('.github/workflows/loto7_generation4_run.yml').read_text(encoding='utf-8')
          refresh = text.index('Refresh existing production results before adoption decision')
          gate = text.index('Build Generation 4 prediction through strict adoption gates')
          assert refresh < gate
          for marker in (
              'outputs/evolution_prediction_history_result.txt',
              'outputs/generation4/shadow_history.csv',
              'outputs/generation4/champion_challenger_summary.json',
              'outputs/generation4/champion_challenger_report.txt',
              'Record rejected LOTO7 Generation 4 adoption and refresh live results [skip ci]',
          ):
              assert marker in text, marker
          print('production rejection path ordering and retained files are valid')
          PY

      - name: Commit refreshed validation evidence
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/role_ensemble" "$SNAPSHOT/outputs/generation4"
          cp -f outputs/role_ensemble/evaluator_consistency.json "$SNAPSHOT/outputs/role_ensemble/"
          cp -f outputs/role_ensemble/evaluator_consistency_subset.json "$SNAPSHOT/outputs/role_ensemble/"
          cp -f outputs/evolution_prediction_history_result.txt "$SNAPSHOT/outputs/"
          cp -f outputs/generation4/shadow_history.csv "$SNAPSHOT/outputs/generation4/"
          cp -f outputs/generation4/champion_challenger_summary.json "$SNAPSHOT/outputs/generation4/"
          cp -f outputs/generation4/champion_challenger_report.txt "$SNAPSHOT/outputs/generation4/"
          cp -f outputs/generation4/rejection_live_refresh_check.json "$SNAPSHOT/outputs/generation4/"
          for ATTEMPT in 1 2 3 4; do
            git fetch origin fix/unify-evaluation-live-results
            git reset --hard origin/fix/unify-evaluation-live-results
            mkdir -p outputs/role_ensemble outputs/generation4
            cp -f "$SNAPSHOT/outputs/role_ensemble/"* outputs/role_ensemble/
            cp -f "$SNAPSHOT/outputs/evolution_prediction_history_result.txt" outputs/
            cp -f "$SNAPSHOT/outputs/generation4/"* outputs/generation4/
            git add -f \
              outputs/role_ensemble/evaluator_consistency.json \
              outputs/role_ensemble/evaluator_consistency_subset.json \
              outputs/evolution_prediction_history_result.txt \
              outputs/generation4/shadow_history.csv \
              outputs/generation4/champion_challenger_summary.json \
              outputs/generation4/champion_challenger_report.txt \
              outputs/generation4/rejection_live_refresh_check.json
            if git diff --cached --quiet; then exit 0; fi
            git commit -m "Validate unified evaluator and refresh live results [skip ci]"
            if git push origin HEAD:fix/unify-evaluation-live-results; then exit 0; fi
            sleep $((ATTEMPT * 5))
          done
          exit 1

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evaluator-full-data-check
          path: |
            outputs/role_ensemble/evaluator_consistency*.json
            outputs/generation4/rejection_live_refresh_check.json
            outputs/evolution_prediction_history_result.txt
            outputs/generation4/champion_challenger_summary.json
            outputs/generation4/champion_challenger_report.txt
          if-no-files-found: error
