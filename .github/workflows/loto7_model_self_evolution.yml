name: LOTO7 Model Self Evolution

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Model-only self-evolution iterations"
        required: false
        default: "1000"
      max_targets:
        description: "Recent holdout target draws. Use 0 for all targets."
        required: false
        default: "0"
      apply_model:
        description: "Apply improved model to loto7_best_model.json when adoption passes"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
  push:
    paths:
      - "loto7_model_self_evolver.py"
      - "scripts/recent_era_optimizer.py"
      - "scripts/build_latest_prediction_from_best_model.py"
      - ".github/workflows/loto7_model_self_evolution.yml"
  schedule:
    # JST 00:00 / 06:00 / 12:00 / 18:00 = UTC 15:00 / 21:00 / 03:00 / 09:00
    - cron: "0 3,9,15,21 * * *"

permissions:
  contents: write

concurrency:
  group: loto7-model-self-evolution-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  model-self-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest state before run
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Snapshot baseline model for recent era guard
        run: |
          set -euo pipefail
          mkdir -p outputs/recent_era
          cp -f loto7_best_model.json outputs/recent_era/baseline_best_model_before_self_evolution.json

      - name: Run model-only self evolution
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          APPLY_FLAG="--apply"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.apply_model || 'true' }}" != "true" ]; then
            APPLY_FLAG=""
          fi
          python loto7_model_self_evolver.py \
            --iterations "${{ github.event.inputs.iterations || '1000' }}" \
            --max-targets "${{ github.event.inputs.max_targets || '0' }}" \
            --min-train-draws 1 \
            --holdout-start-draw 2 \
            --parent-pool-size 36 \
            --random-parents 12 \
            --exploration-rate 0.30 \
            --stagnation-patience 50 \
            --seed "${{ github.run_id }}" \
            --state outputs/model_self_evolution/standalone_state.json \
            --history outputs/model_self_evolution/standalone_history.csv \
            --summary outputs/model_self_evolution/standalone_summary.json \
            --report outputs/model_self_evolution/standalone_report.txt \
            --candidate-model outputs/model_self_evolution/standalone_best_candidate_model.json \
            --checkpoint-commit \
            --checkpoint-branch "${GITHUB_REF_NAME}" \
            --max-runtime-minutes 320 \
            --safe-exit-minutes 30 \
            --min-roi-delta-percent 0.10 \
            --min-profit-delta 0 \
            --allow-high-grade-drop \
            ${APPLY_FLAG}

      - name: Run recent era optimizer guard
        if: always()
        run: |
          set -euo pipefail
          mkdir -p outputs/recent_era
          python scripts/recent_era_optimizer.py \
            --csv loto7.csv \
            --baseline-model outputs/recent_era/baseline_best_model_before_self_evolution.json \
            --candidate-model loto7_best_model.json \
            --best-model loto7_best_model.json \
            --summary outputs/recent_era/recent_era_optimizer.json \
            --report outputs/recent_era/recent_era_optimizer_report.txt \
            --purchase-count 5 \
            --unit-cost 300 \
            --min-train-draws 1 \
            --holdout-start-draw 2 \
            --recent-start-year 2020 \
            --min-full-roi-delta-percent 0.0 \
            --min-full-profit-delta 0 \
            --min-recent-roi-delta-percent -5.0 \
            --min-recent-profit-delta -30000 \
            --min-recent-payout-roi-percent 8.0 \
            --restore-on-fail

      - name: Detect regime strategy for adopted model
        if: always()
        run: |
          set -euo pipefail
          mkdir -p outputs/role_ensemble outputs/holdout
          python scripts/detect_loto7_regime.py \
            --csv loto7.csv \
            --base-strategy outputs/role_ensemble/role_strategy.json \
            --output outputs/role_ensemble/regime_state.json \
            --strategy-output outputs/role_ensemble/regime_strategy.json \
            --report outputs/role_ensemble/regime_strategy_report.txt \
            --purchase-count 5 || echo "::warning::regime strategy detection failed; prediction will fallback to default role strategy"

      - name: Build latest prediction from adopted model
        if: always()
        run: |
          set -euo pipefail
          mkdir -p outputs/holdout outputs/role_ensemble
          python scripts/build_latest_prediction_from_best_model.py \
            --csv loto7.csv \
            --best-model loto7_best_model.json \
            --prediction outputs/evolution_best_prediction.csv \
            --prediction-report outputs/holdout/latest_prediction_report.txt \
            --prediction-mode role_ensemble \
            --role-strategy outputs/role_ensemble/regime_strategy.json \
            --purchase-count 5 \
            --overlap-limit 4

      - name: Commit model self-evolution outputs
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/model_self_evolution" "$SNAPSHOT/outputs/holdout" "$SNAPSHOT/outputs/role_ensemble" "$SNAPSHOT/outputs/recent_era"
          cp -f loto7_best_model.json "$SNAPSHOT/" 2>/dev/null || true
          cp -f outputs/evolution_best_prediction.csv "$SNAPSHOT/outputs/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.json "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.txt "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.csv "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/holdout/latest_prediction_report.txt "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          cp -f outputs/role_ensemble/regime_*.json "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/role_ensemble/regime_*.txt "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/recent_era/*.json "$SNAPSHOT/outputs/recent_era/" 2>/dev/null || true
          cp -f outputs/recent_era/*.txt "$SNAPSHOT/outputs/recent_era/" 2>/dev/null || true

          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

          mkdir -p outputs/model_self_evolution outputs/holdout outputs/role_ensemble outputs/recent_era
          cp -f "$SNAPSHOT/loto7_best_model.json" loto7_best_model.json 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/evolution_best_prediction.csv outputs/evolution_best_prediction.csv 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/model_self_evolution/* outputs/model_self_evolution/ 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/holdout/* outputs/holdout/ 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/role_ensemble/* outputs/role_ensemble/ 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/recent_era/* outputs/recent_era/ 2>/dev/null || true

          git add -f \
            loto7_best_model.json \
            outputs/evolution_best_prediction.csv \
            outputs/holdout/latest_prediction_report.txt \
            outputs/role_ensemble/regime_*.json \
            outputs/role_ensemble/regime_*.txt \
            outputs/recent_era/*.json \
            outputs/recent_era/*.txt \
            outputs/model_self_evolution/standalone_*.json \
            outputs/model_self_evolution/standalone_*.txt \
            outputs/model_self_evolution/standalone_*.csv || true
          if git diff --cached --quiet; then
            echo "No model self-evolution changes"
            exit 0
          fi
          git commit -m "Run LOTO7 model self-evolution and recent era guard [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload model self-evolution artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-model-self-evolution
          path: |
            loto7_best_model.json
            outputs/evolution_best_prediction.csv
            outputs/holdout/latest_prediction_report.txt
            outputs/role_ensemble/regime_*.json
            outputs/role_ensemble/regime_*.txt
            outputs/recent_era/*.json
            outputs/recent_era/*.txt
            outputs/model_self_evolution/*.json
            outputs/model_self_evolution/*.txt
            outputs/model_self_evolution/*.csv
          if-no-files-found: ignore
