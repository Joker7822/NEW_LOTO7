name: LOTO7 Model Self Evolution

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: "Model-only self-evolution iterations"
        required: false
        default: "1000"
      max_targets:
        description: "Recent holdout target draws. Use 0 for all targets."
        required: false
        default: "0"
      apply_model:
        description: "Apply improved model to loto7_best_model.json when adoption passes"
        required: true
        type: choice
        default: "true"
        options:
          - "true"
          - "false"
  push:
    paths:
      - "loto7_model_self_evolver.py"
      - ".github/workflows/loto7_model_self_evolution.yml"
  schedule:
    # JST 00:00 / 06:00 / 12:00 / 18:00 = UTC 15:00 / 21:00 / 03:00 / 09:00
    - cron: "0 3,9,15,21 * * *"

permissions:
  contents: write

concurrency:
  group: loto7-model-self-evolution-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  model-self-evolution:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest state before run
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Run model-only self evolution
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          APPLY_FLAG="--apply"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.apply_model || 'true' }}" != "true" ]; then
            APPLY_FLAG=""
          fi
          python loto7_model_self_evolver.py \
            --iterations "${{ github.event.inputs.iterations || '1000' }}" \
            --max-targets "${{ github.event.inputs.max_targets || '0' }}" \
            --min-train-draws 1 \
            --holdout-start-draw 2 \
            --parent-pool-size 36 \
            --random-parents 12 \
            --exploration-rate 0.30 \
            --stagnation-patience 50 \
            --seed "${{ github.run_id }}" \
            --state outputs/model_self_evolution/standalone_state.json \
            --history outputs/model_self_evolution/standalone_history.csv \
            --summary outputs/model_self_evolution/standalone_summary.json \
            --report outputs/model_self_evolution/standalone_report.txt \
            --candidate-model outputs/model_self_evolution/standalone_best_candidate_model.json \
            --checkpoint-commit \
            --checkpoint-branch "${GITHUB_REF_NAME}" \
            --max-runtime-minutes 320 \
            --safe-exit-minutes 30 \
            --min-roi-delta-percent 0.10 \
            --min-profit-delta 0 \
            --allow-high-grade-drop \
            ${APPLY_FLAG}

      - name: Commit model self-evolution outputs
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/model_self_evolution"
          cp -f loto7_best_model.json "$SNAPSHOT/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.json "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.txt "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true
          cp -f outputs/model_self_evolution/standalone_*.csv "$SNAPSHOT/outputs/model_self_evolution/" 2>/dev/null || true

          git fetch origin "${GITHUB_REF_NAME}"
          git reset --hard "origin/${GITHUB_REF_NAME}"

          mkdir -p outputs/model_self_evolution
          cp -f "$SNAPSHOT/loto7_best_model.json" loto7_best_model.json 2>/dev/null || true
          cp -f "$SNAPSHOT"/outputs/model_self_evolution/* outputs/model_self_evolution/ 2>/dev/null || true

          git add -f \
            loto7_best_model.json \
            outputs/model_self_evolution/standalone_*.json \
            outputs/model_self_evolution/standalone_*.txt \
            outputs/model_self_evolution/standalone_*.csv || true
          if git diff --cached --quiet; then
            echo "No model self-evolution changes"
            exit 0
          fi
          git commit -m "Run LOTO7 model self-evolution [skip ci]"
          git push origin HEAD:"${GITHUB_REF_NAME}"

      - name: Upload model self-evolution artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-model-self-evolution
          path: |
            loto7_best_model.json
            outputs/model_self_evolution/*.json
            outputs/model_self_evolution/*.txt
            outputs/model_self_evolution/*.csv
          if-no-files-found: ignore
