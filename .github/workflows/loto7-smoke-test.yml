name: LOTO7 Smoke Test

on:
  push:
    branches:
      - main
    paths:
      - "*.py"
      - "loto7.csv"
      - ".github/workflows/loto7-smoke-test.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python files
        run: python -m py_compile *.py

      - name: Run minimal safe evolution
        run: |
          python loto7_safe_evolution_runner.py \
            --output-dir outputs/smoke \
            --best-model outputs/smoke/loto7_best_model.json \
            --generations 1 \
            --population 4 \
            --elite-count 1 \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets 5 \
            --target-stride 1 \
            --max-runtime-minutes 10 \
            --safe-exit-minutes 0 \
            --push-every-generation 0

      - name: Run holdout evaluator smoke
        run: |
          python holdout_evaluator.py \
            --csv loto7.csv \
            --best-model outputs/smoke/loto7_best_model.json \
            --holdout-start-draw 675 \
            --holdout-end-draw 681 \
            --purchase-count 5 \
            --output outputs/smoke/holdout_result.csv \
            --summary outputs/smoke/holdout_summary.json

      - name: Validate generated outputs
        run: |
          test -s outputs/smoke/loto7_best_model.json
          test -s outputs/smoke/holdout_result.csv
          test -s outputs/smoke/holdout_summary.json
