name: LOTO7 Evolution Chunk

on:
  workflow_dispatch:
    inputs:
      shard_id:
        description: "Shard id. Use 0 when num_shards is 1."
        required: true
        default: "0"
      num_shards:
        description: "Total shard count. Use 1 for simple reliable completion."
        required: true
        default: "1"
      generations:
        description: "Upper generation target. Increase this on later resume runs."
        required: true
        default: "12"
      population:
        description: "Population size. 24-40 is recommended for GitHub Actions."
        required: true
        default: "32"
      elite_count:
        description: "Elite count. Must be smaller than population."
        required: true
        default: "4"
      max_targets:
        description: "Backtest target draw count. Use 120-240 for completion-first runs."
        required: true
        default: "180"
      target_stride:
        description: "1 = every draw, 2 = every other draw. 2 is faster."
        required: true
        default: "2"
      resume:
        description: "true to resume only when state file already exists."
        required: true
        default: "auto"
      push_final:
        description: "Commit outputs if this chunk finishes before safe timeout."
        required: true
        default: "true"

permissions:
  contents: write

env:
  PYTHONUNBUFFERED: "1"

concurrency:
  group: loto7-evolution-chunk-${{ github.event.inputs.num_shards }}-${{ github.event.inputs.shard_id }}
  cancel-in-progress: false

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve resume mode
        id: resume_mode
        shell: bash
        run: |
          set -euo pipefail
          SHARD_ID="${{ github.event.inputs.shard_id }}"
          NUM_SHARDS="${{ github.event.inputs.num_shards }}"
          STATE_PATH=$(printf "outputs/evolution_state_shard%02d_of_%02d.json" "$SHARD_ID" "$NUM_SHARDS")
          RESUME_INPUT="${{ github.event.inputs.resume }}"
          echo "state_path=$STATE_PATH" >> "$GITHUB_OUTPUT"
          if [[ "$RESUME_INPUT" == "true" ]]; then
            echo "resume_flag=--resume" >> "$GITHUB_OUTPUT"
          elif [[ "$RESUME_INPUT" == "auto" && -s "$STATE_PATH" ]]; then
            echo "resume_flag=--resume" >> "$GITHUB_OUTPUT"
          else
            echo "resume_flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Run chunked safe evolution
        shell: bash
        run: |
          set -euo pipefail
          PUSH_FINAL="${{ github.event.inputs.push_final }}"
          PUSH_FINAL_FLAG=""
          if [[ "$PUSH_FINAL" == "true" ]]; then
            PUSH_FINAL_FLAG="--push-final"
          fi

          python loto7_safe_evolution_runner.py \
            --csv loto7.csv \
            --output-dir outputs \
            --best-model loto7_best_model.json \
            --shard-id "${{ github.event.inputs.shard_id }}" \
            --num-shards "${{ github.event.inputs.num_shards }}" \
            --generations "${{ github.event.inputs.generations }}" \
            --population "${{ github.event.inputs.population }}" \
            --elite-count "${{ github.event.inputs.elite_count }}" \
            --purchase-count 5 \
            --min-train-draws 60 \
            --max-targets "${{ github.event.inputs.max_targets }}" \
            --target-stride "${{ github.event.inputs.target_stride }}" \
            --max-runtime-minutes 50 \
            --safe-exit-minutes 8 \
            --push-every-generation 0 \
            ${{ steps.resume_mode.outputs.resume_flag }} \
            $PUSH_FINAL_FLAG

      - name: Commit outputs when trainer did not push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add outputs loto7_best_model*.json || true
          if git diff --cached --quiet; then
            echo "No output changes to commit."
          else
            git commit -m "Update LOTO7 evolution chunk outputs"
            git pull --rebase --autostash
            git push
          fi
