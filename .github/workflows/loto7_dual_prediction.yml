name: LOTO7 Dual Model Prediction

on:
  workflow_dispatch:
  workflow_run:
    # Evolution Trainer already builds the final adaptive prediction itself.
    # Rebuild after standalone evolution or sealed nested promotion.
    workflows:
      - LOTO7 Model Self Evolution
      - LOTO7 Recent Era Self Evolution
      - LOTO7 Nested Walk Forward Validation
    types:
      - completed

permissions:
  contents: write

# Keep prediction runs serialized while retaining the full waiting queue.
concurrency:
  group: loto7-dual-prediction-${{ github.ref_name }}
  cancel-in-progress: false
  queue: max

jobs:
  dual-prediction:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main') }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Pull latest outputs
        run: |
          set -euo pipefail
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"

      - name: Optimize recent era role strategy
        run: |
          set -euo pipefail
          mkdir -p outputs/recent_era outputs/super_recent outputs/role_ensemble
          if [ -s outputs/role_ensemble/role_ensemble_backtest.csv ]; then
            python scripts/optimize_recent_era_role_strategy.py \
              --input outputs/role_ensemble/role_ensemble_backtest.csv \
              --output outputs/recent_era/recent_role_strategy.json \
              --report outputs/recent_era/recent_role_strategy_report.txt \
              --start-year 2020 \
              --purchase-count 5 \
              --unit-cost 300 \
              --max-main-best 1 \
              --min-completed-draws 80
          else
            echo "::warning::role_ensemble_backtest.csv not found; skipping recent era role strategy"
          fi

      - name: Detect regime with recent era role strategy
        run: |
          set -euo pipefail
          mkdir -p outputs/role_ensemble outputs/recent_era outputs/super_recent
          BASE_STRATEGY="outputs/recent_era/recent_role_strategy.json"
          if [ ! -s "$BASE_STRATEGY" ]; then
            BASE_STRATEGY="outputs/role_ensemble/role_strategy.json"
          fi
          python scripts/detect_loto7_regime.py \
            --csv loto7.csv \
            --base-strategy "$BASE_STRATEGY" \
            --output outputs/role_ensemble/regime_state.json \
            --strategy-output outputs/role_ensemble/regime_strategy.json \
            --report outputs/role_ensemble/regime_strategy_report.txt \
            --purchase-count 5

      - name: Build model comparison reports
        run: |
          set -euo pipefail
          mkdir -p outputs/recent_era outputs/super_recent
          python scripts/build_recent_era_model_comparison.py \
            --csv loto7.csv \
            --full-model loto7_best_model.json \
            --recent-model outputs/recent_era/recent_era_best_model.json \
            --summary outputs/recent_era/recent_era_model_comparison_summary.json \
            --report outputs/recent_era/recent_era_model_comparison_report.txt \
            --recent-start-year 2020 \
            --purchase-count 5 \
            --unit-cost 300
          if [ -s outputs/super_recent/super_recent_best_model.json ]; then
            python scripts/build_recent_era_model_comparison.py \
              --csv loto7.csv \
              --full-model loto7_best_model.json \
              --recent-model outputs/super_recent/super_recent_best_model.json \
              --summary outputs/super_recent/super_recent_model_comparison_summary.json \
              --report outputs/super_recent/super_recent_model_comparison_report.txt \
              --recent-start-year 2023 \
              --purchase-count 5 \
              --unit-cost 300
          else
            echo "::warning::super recent model not found; comparison skipped"
          fi

      - name: Build optimized five-ticket portfolio
        run: |
          set -euo pipefail
          mkdir -p outputs/holdout outputs/recent_era outputs/super_recent outputs/role_ensemble
          SUPER_COUNT=$(python - <<'PY'
          import json
          from pathlib import Path
          def model_id(path):
              p=Path(path)
              if not p.exists():
                  return ''
              payload=json.loads(p.read_text(encoding='utf-8'))
              raw=payload.get('genome', payload)
              return str(raw.get('id', ''))
          recent=model_id('outputs/recent_era/recent_era_best_model.json')
          super_recent=model_id('outputs/super_recent/super_recent_best_model.json')
          print(1 if recent and super_recent and recent != super_recent else 0)
          PY
          )
          echo "super_recent_count=${SUPER_COUNT}"
          python scripts/build_dual_model_prediction.py \
            --csv loto7.csv \
            --full-model loto7_best_model.json \
            --recent-model outputs/recent_era/recent_era_best_model.json \
            --super-recent-model outputs/super_recent/super_recent_best_model.json \
            --regime-strategy outputs/role_ensemble/regime_strategy.json \
            --prediction-history outputs/evolution_prediction_history.csv \
            --prediction outputs/evolution_best_prediction.csv \
            --prediction-report outputs/holdout/latest_prediction_report.txt \
            --portfolio-summary outputs/holdout/latest_portfolio_summary.json \
            --purchase-count 5 \
            --full-count 2 \
            --recent-count 1 \
            --super-recent-count "$SUPER_COUNT" \
            --strict-overlap-limit 4 \
            --max-number-usage 4 \
            --history-overlap-limit 6 \
            --diversity-weight 1.15 \
            --first-prize-weight 1.25 \
            --candidates-per-source 240 \
            --candidates-per-step 100 \
            --beam-width 320
          python scripts/enforce_prediction_constraints.py \
            --prediction outputs/evolution_best_prediction.csv \
            --report outputs/holdout/latest_prediction_report.txt \
            --max-number-usage 4 \
            --max-pair-overlap 4

      - name: Update cumulative prediction history
        run: |
          set -euo pipefail
          python scripts/update_prediction_history.py \
            --latest outputs/evolution_best_prediction.csv \
            --history outputs/evolution_prediction_history.csv \
            --csv loto7.csv

      - name: Check cumulative prediction history results
        run: |
          set -euo pipefail
          python scripts/check_prediction_history_results.py \
            --history outputs/evolution_prediction_history.csv \
            --csv loto7.csv \
            --output outputs/evolution_prediction_history_result.txt

      - name: Commit dual prediction outputs with retry
        if: always()
        run: |
          set -euo pipefail
          SNAPSHOT="$(mktemp -d)"
          mkdir -p "$SNAPSHOT/outputs/holdout" "$SNAPSHOT/outputs/role_ensemble" "$SNAPSHOT/outputs/recent_era" "$SNAPSHOT/outputs/super_recent"
          cp -f outputs/evolution_best_prediction.csv "$SNAPSHOT/outputs/" 2>/dev/null || true
          cp -f outputs/evolution_prediction_history.csv "$SNAPSHOT/outputs/" 2>/dev/null || true
          cp -f outputs/evolution_prediction_history_result.txt "$SNAPSHOT/outputs/" 2>/dev/null || true
          cp -f outputs/holdout/latest_prediction_report.txt "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          cp -f outputs/holdout/latest_portfolio_summary.json "$SNAPSHOT/outputs/holdout/" 2>/dev/null || true
          cp -f outputs/role_ensemble/regime_*.json "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/role_ensemble/regime_*.txt "$SNAPSHOT/outputs/role_ensemble/" 2>/dev/null || true
          cp -f outputs/recent_era/recent_role_strategy.* "$SNAPSHOT/outputs/recent_era/" 2>/dev/null || true
          cp -f outputs/recent_era/recent_era_model_comparison_* "$SNAPSHOT/outputs/recent_era/" 2>/dev/null || true
          cp -f outputs/super_recent/super_recent_model_comparison_* "$SNAPSHOT/outputs/super_recent/" 2>/dev/null || true

          for ATTEMPT in 1 2 3 4; do
            echo "commit attempt=${ATTEMPT}"
            git fetch origin "${GITHUB_REF_NAME}"
            git reset --hard "origin/${GITHUB_REF_NAME}"
            mkdir -p outputs/holdout outputs/role_ensemble outputs/recent_era outputs/super_recent
            cp -f "$SNAPSHOT"/outputs/evolution_best_prediction.csv outputs/evolution_best_prediction.csv 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/evolution_prediction_history.csv outputs/evolution_prediction_history.csv 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/evolution_prediction_history_result.txt outputs/evolution_prediction_history_result.txt 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/holdout/* outputs/holdout/ 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/role_ensemble/* outputs/role_ensemble/ 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/recent_era/* outputs/recent_era/ 2>/dev/null || true
            cp -f "$SNAPSHOT"/outputs/super_recent/* outputs/super_recent/ 2>/dev/null || true
            git add -f \
              outputs/evolution_best_prediction.csv \
              outputs/evolution_prediction_history.csv \
              outputs/evolution_prediction_history_result.txt \
              outputs/holdout/latest_prediction_report.txt \
              outputs/holdout/latest_portfolio_summary.json \
              outputs/role_ensemble/regime_*.json \
              outputs/role_ensemble/regime_*.txt \
              outputs/recent_era/recent_role_strategy.* \
              outputs/recent_era/recent_era_model_comparison_* \
              outputs/super_recent/super_recent_model_comparison_* || true
            if git diff --cached --quiet; then
              echo "No dual prediction changes"
              exit 0
            fi
            git commit -m "Update LOTO7 optimized five-ticket portfolio [skip ci]"
            if git push origin HEAD:"${GITHUB_REF_NAME}"; then
              echo "push succeeded on attempt=${ATTEMPT}"
              exit 0
            fi
            echo "::warning::push conflict on attempt=${ATTEMPT}; retrying from latest origin"
            sleep $((ATTEMPT * 10))
          done
          echo "::error::failed to commit dual prediction outputs after retries"
          exit 1

      - name: Upload dual prediction artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loto7-dual-model-prediction
          path: |
            outputs/evolution_best_prediction.csv
            outputs/evolution_prediction_history.csv
            outputs/evolution_prediction_history_result.txt
            outputs/holdout/latest_prediction_report.txt
            outputs/holdout/latest_portfolio_summary.json
            outputs/role_ensemble/regime_*.json
            outputs/role_ensemble/regime_*.txt
            outputs/recent_era/recent_role_strategy.*
            outputs/recent_era/recent_era_model_comparison_*
            outputs/super_recent/super_recent_model_comparison_*
          if-no-files-found: ignore
